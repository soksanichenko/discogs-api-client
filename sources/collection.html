<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discogs Collection</title>
  <link rel="stylesheet" href="theme.css?v=__THEME_CSS_VERSION__">
  <style>
    /* ── Rating ── */
    .rating { color: #f5b942; white-space: nowrap; }
    .rating .empty { color: var(--border); }
  </style>
</head>
<body>

<header class="site-header">
  <a href="." class="header-name">Discogs <span>Collection</span></a>
  <div class="header-right" id="site-nav">Checking sign-in status…</div>
</header>

<div class="controls">
  <label>Username</label>
  <input type="text" id="username" placeholder="e.g. 360vinyl">

  <div class="sep"></div>

  <label>Folder</label>
  <select id="folder" onchange="onFolderChange()">
    <option value="0">All</option>
  </select>

  <div class="sep"></div>

  <label>Per page</label>
  <select id="per_page" onchange="onControlChange()">
    <option value="25">25</option>
    <option value="50" selected>50</option>
    <option value="100">100</option>
  </select>

  <button class="btn" onclick="loadAll()">Load</button>
  <button class="btn btn-sm ml-auto" id="filters-toggle-btn" onclick="enableFilters()">🔍 Enable filters</button>
</div>

<div class="filters-bar" id="filters-row">
  <button class="btn btn-sm" style="margin-left:auto" onclick="refreshFilterData()" title="Cached collection snapshot may be up to 1 hour old — click to refetch from Discogs">↻ Refresh</button>
  <button class="btn btn-sm" onclick="clearFilters()">✕ Clear filters</button>
</div>

<div id="bulk-bar">
  <span id="bulk-count"></span>
  <button class="btn btn-success btn-sm" onclick="startQueue()">List selected for sale…</button>
  <button class="btn btn-danger btn-sm" onclick="removeSelected()">Remove from collection</button>
  <button class="btn btn-sm" style="margin-left:auto" onclick="clearSelection()">✕ Clear</button>
</div>

<div id="root">
  <div class="state">Enter a Discogs username and click Load.</div>
</div>

<!-- ── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">List for Sale</h2>
      <button class="modal-close" onclick="cancelModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-release-info" class="release-info" style="display:none"></div>
      <div class="warn-note" id="modal-warn"></div>
      <form id="listing-form" onsubmit="return false">
        <div class="form-section">Grading</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Media Condition <span style="color:var(--danger)">*</span></label>
            <select name="condition">
              <option value="">— select —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
            </select>
          </div>
          <div class="form-row">
            <label>Sleeve Condition</label>
            <select name="sleeve_condition">
              <option value="">— not graded —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
              <option>Generic</option>
              <option>Not Graded</option>
              <option>No Cover</option>
            </select>
          </div>
        </div>

        <div class="form-section">Sale</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Price <span style="color:var(--danger)">*</span></label>
            <input type="text" name="price" placeholder="9.99">
            <div class="form-hint" id="price-suggestion"></div>
          </div>
          <div class="form-row">
            <label>Status <span style="color:var(--danger)">*</span></label>
            <select name="status">
              <option value="For Sale">For Sale</option>
              <option value="Draft">Draft</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" name="allow_offers" id="allow_offers">
            <label for="allow_offers" style="display:inline;font-weight:400;margin:0">Allow offers</label>
          </div>
        </div>

        <div class="form-row">
          <label>Comments <span style="color:var(--text-muted);font-weight:400">(public — shown to buyers)</span></label>
          <textarea name="comments" placeholder="Condition notes, pressing info…"></textarea>
        </div>

        <div class="form-section">Seller-only fields</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Location</label>
            <input type="text" name="location" placeholder="Shelf A-3">
          </div>
          <div class="form-row">
            <label>Private Notes</label>
            <input type="text" name="external_id" placeholder="Internal reference">
          </div>
        </div>
        <div class="form-2col">
          <div class="form-row">
            <label>Weight (g)</label>
            <input type="text" name="weight" placeholder="auto or e.g. 200">
          </div>
          <div class="form-row">
            <label>Counts As</label>
            <input type="text" name="format_quantity" placeholder="auto or 1">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cancelModal()">Cancel</button>
      <button class="btn btn-success" id="modal-save-btn" onclick="submitModal()">List for sale</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="nav.js?v=__NAV_JS_VERSION__"></script>
<script src="combo.js?v=__COMBO_JS_VERSION__"></script>
<script>
// ── Base URL (works on any subpath) ─────────────────────────────────────────
const BASE = window.location.pathname.replace(/\/collection\/?$/, '');
initDiscogsNav('site-nav');

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) { return iso ? iso.slice(0, 10) : ''; }
function parseNumAuto(v) {
  if (!v || v.trim() === '') return undefined;
  if (v.trim().toLowerCase() === 'auto') return 'auto';
  const n = parseFloat(v);
  return isNaN(n) ? undefined : n;
}
function salesHistoryUrl(releaseId) { return `https://www.discogs.com/sell/history/${releaseId}`; }

function releaseArtist(basic) { return basic?.artists?.[0]?.name ?? ''; }

// A release can have more than one distinct format entry (e.g. a listing
// bundling separate bitrate-encoded files, or a box set mixing media types)
// — formats is a real array, not a pre-joined string, so each entry is kept
// and summarized on its own.
function formatSummary(f) {
  if (!f) return '';
  return [
    f.qty && f.qty !== '1' ? `${f.qty}×` : null,
    f.name,
    f.text,
    f.descriptions?.length ? f.descriptions.join(', ') : null,
  ].filter(Boolean).join(' · ');
}
function releaseFormats(basic) {
  return (basic?.formats ?? []).map(formatSummary).filter(Boolean);
}
function releaseFormat(basic) { return releaseFormats(basic)[0] ?? ''; }

// Table cell: name/qty/text stay a plain header line, but a format's own
// descriptions (e.g. '7", 45 RPM, Limited Edition, Stereo') become one bullet
// each instead of a single comma-joined run-on line. Multiple format entries
// (a real array — see formatSummary above) each get their own header+list block.
function renderFormatCell(basic) {
  const formats = basic?.formats ?? [];
  if (!formats.length) return '';
  const blocks = formats.map(f => {
    const header = [f.qty && f.qty !== '1' ? `${f.qty}×` : null, f.name, f.text].filter(Boolean).join(' ');
    const descs = f.descriptions ?? [];
    const list = descs.length
      ? `<ul style="margin:2px 0 0;padding-left:1.1em">${descs.map(d => `<li>${esc(d)}</li>`).join('')}</ul>`
      : '';
    return `<div>${esc(header)}${list}</div>`;
  });
  return blocks.join('<div style="height:6px"></div>');
}
function releaseCatno(basic) { return basic?.labels?.[0]?.catno ?? ''; }
function releaseLabelName(basic) { return basic?.labels?.[0]?.name ?? ''; }
function releaseArtistId(basic) { return basic?.artists?.[0]?.id ?? null; }
function releaseLabelId(basic) { return basic?.labels?.[0]?.id ?? null; }
function linkOrText(url, text, cls = 'cell-link') {
  const t = esc(text);
  return url ? `<a class="${cls}" href="${url}" target="_blank">${t}</a>` : t;
}
function releaseLabel(item) {
  const b = item?.basic_information ?? {};
  return [releaseArtist(b), b.title].filter(Boolean).join(' – ');
}
function ratingStars(n) {
  n = Number(n) || 0;
  let html = '<span class="rating">';
  for (let i = 1; i <= 5; i++) html += i <= n ? '★' : '<span class="empty">★</span>';
  return html + '</span>';
}

// ── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ── State ───────────────────────────────────────────────────────────────────
let _items = [];           // current page of collection items
let _selected = new Set(); // selected instance_ids
let _pagination = {};
let _currentPage = 1;
let _lastFoldersUser = null;
let _folders = [];            // [{id, name, count}, ...]
let _collectionFields = [];   // user-defined collection notes fields: [{id, name, ...}, ...]

// Global filters: Discogs has no filter-by-format/label/year/rating query
// param, so filtering means fetching the *entire* folder into memory first
// (unlike sort, which stays page-scoped) — opt-in via "Enable filters" since
// large collections take many requests. null = not loaded.
let _allItems = null;
let _activeFilters = {};
const FILTER_COLUMNS = [
  { key: 'artist', label: 'Artist' },
  { key: 'format', label: 'Format' },
  { key: 'label', label: 'Label' },
  { key: 'year', label: 'Year' },
  { key: 'rating', label: 'Rating' },
];

// Renders each filter's <label> + combo widget (combo.js) from FILTER_COLUMNS
// and wires it up — replaces what used to be static <select> markup, since
// native <select> popups can't be resized/scrolled reliably for filters with
// hundreds of values (e.g. Artist/Label on a large collection).
const _filterCombos = {};
(function initFilterCombos() {
  const html = FILTER_COLUMNS.map(c => `
    <label>${esc(c.label)}</label>
    <div class="combo" id="filter-${c.key}"><button type="button" class="combo-toggle"></button><div class="combo-menu"><input type="text" class="combo-search" placeholder="Filter…"><div class="combo-list"></div></div></div>
  `).join('');
  document.getElementById('filters-row').insertAdjacentHTML('afterbegin', html);
  for (const c of FILTER_COLUMNS) {
    _filterCombos[c.key] = initCombo(document.getElementById(`filter-${c.key}`), {
      allLabel: `All ${c.label}`,
      onChange: v => onFilterChange(c.key, v),
    });
  }
})();

let _sort = 'added';
let _sortOrder = 'desc';

// Discogs' collection-releases endpoint only accepts these as the `sort` query
// param — folder/notes have no server-side sort, so those are sorted client-side
// (current page only) instead.
const SERVER_SORT_KEYS = new Set(['artist', 'title', 'format', 'label', 'catno', 'year', 'rating', 'added']);
const DEFAULT_DESC_KEYS = new Set(['added', 'rating']);
const COLUMNS = [
  { key: 'artist', label: 'Artist' },
  { key: 'title', label: 'Title' },
  { key: 'format', label: 'Format' },
  { key: 'label', label: 'Label' },
  { key: 'catno', label: 'Cat#' },
  { key: 'year', label: 'Year' },
  { key: 'rating', label: 'Rating' },
  { key: 'folder', label: 'Folder', clientOnly: true },
  { key: 'notes', label: 'Notes', clientOnly: true, optional: true },
  { key: 'added', label: 'Added' },
];

function folderNameFor(item) {
  const fid = item.folder_id ?? document.getElementById('folder').value;
  return _folders.find(f => String(f.id) === String(fid))?.name ?? '';
}

function itemNotesText(item) {
  if (!_collectionFields.length) return '';
  const byId = Object.fromEntries(_collectionFields.map(f => [f.id, f.name]));
  return (item.notes ?? [])
    .filter(n => n.value)
    .map(n => `${byId[n.field_id] ?? ''}: ${n.value}`)
    .join('; ');
}

// [{key, order}, ...] in priority order. Chain[0] is always kept in sync with
// _sort/_sortOrder (the API-backed primary sort); Shift+click appends/edits
// further tie-breaker keys, which only reorder the currently loaded page —
// Discogs' API has no multi-column sort, so there's no way to do this globally.
let _sortChain = [{ key: 'added', order: 'desc' }];

// Remembers the last sort the user picked (per browser, via localStorage) so
// it's the default next time — an explicit ?sort= in the URL still wins.
const SORT_STORAGE_KEY = 'discogs_collection_sort';
function saveSortToStorage() {
  try { localStorage.setItem(SORT_STORAGE_KEY, JSON.stringify(_sortChain)); } catch { /* storage unavailable */ }
}
function loadSortFromStorage() {
  try {
    const chain = JSON.parse(localStorage.getItem(SORT_STORAGE_KEY));
    if (Array.isArray(chain) && chain.length && chain[0]?.key && chain[0]?.order) return chain;
  } catch { /* ignore malformed/missing value */ }
  return null;
}

function sortValueOf(item, key) {
  const b = item.basic_information ?? {};
  switch (key) {
    case 'artist': return releaseArtist(b).toLowerCase();
    case 'title': return (b.title ?? '').toLowerCase();
    case 'format': return releaseFormat(b).toLowerCase();
    case 'label': return releaseLabelName(b).toLowerCase();
    case 'catno': return releaseCatno(b).toLowerCase();
    case 'year': return Number(b.year) || 0;
    case 'rating': return Number(item.rating) || 0;
    case 'folder': return folderNameFor(item).toLowerCase();
    case 'notes': return itemNotesText(item).toLowerCase();
    case 'added': return item.date_added ?? '';
    default: return '';
  }
}

// Sorts an arbitrary array in place by the full chain (primary + tie-breakers).
function sortItems(arr) {
  const chain = _sortChain;
  arr.sort((a, b) => {
    for (const { key, order } of chain) {
      const dir = order === 'asc' ? 1 : -1;
      const av = sortValueOf(a, key), bv = sortValueOf(b, key);
      if (av < bv) return -dir;
      if (av > bv) return dir;
    }
    return 0;
  });
  return arr;
}
function applyClientSort() { sortItems(_items); }

// ── API ──────────────────────────────────────────────────────────────────────
async function apiCreateListing(body) {
  const r = await fetch(`${BASE}/marketplace/listings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.message || r.statusText);
  return data;
}

async function apiPriceSuggestions(releaseId) {
  try {
    const r = await fetch(`${BASE}/marketplace/price_suggestions/${releaseId}`);
    if (!r.ok) return null;
    return await r.json(); // { "Mint (M)": {currency, value}, ... }
  } catch { return null; }
}

async function apiRemoveFromCollection(username, item) {
  const folderId = item.folder_id ?? document.getElementById('folder').value ?? 0;
  const url = `${BASE}/users/${encodeURIComponent(username)}/collection/folders/${folderId}/releases/${item.id}/instances/${item.instance_id}`;
  const r = await fetch(url, { method: 'DELETE' });
  if (!r.ok && r.status !== 204) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || r.statusText);
  }
}

// ── Selection ────────────────────────────────────────────────────────────────
function toggleSelect(instanceId, checked) {
  if (checked) _selected.add(instanceId); else _selected.delete(instanceId);
  const row = document.getElementById(`row-${instanceId}`);
  if (row) row.classList.toggle('selected', checked);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  _items.forEach(it => {
    _selected[checked ? 'add' : 'delete'](it.instance_id);
    const row = document.getElementById(`row-${it.instance_id}`);
    if (row) row.classList.toggle('selected', checked);
    const cb = document.getElementById(`check-${it.instance_id}`);
    if (cb) cb.checked = checked;
  });
  updateBulkBar();
}

function clearSelection() {
  _selected.clear();
  document.querySelectorAll('input[id^=check-]').forEach(cb => cb.checked = false);
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  const checkAll = document.getElementById('check-all');
  if (checkAll) checkAll.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  const n = _selected.size;
  const bar = document.getElementById('bulk-bar');
  bar.classList.toggle('visible', n > 0);
  document.getElementById('bulk-count').textContent = `${n} item${n !== 1 ? 's' : ''} selected`;
}

// ── Remove from collection ──────────────────────────────────────────────────
// Page changes always clearSelection() (see load()/renderFilteredPage()), so
// _selected can only ever hold instance_ids from the currently rendered _items.
function removeItemFromState(instanceId) {
  _items = _items.filter(it => it.instance_id !== instanceId);
  if (_allItems) _allItems = _allItems.filter(it => it.instance_id !== instanceId);
  _selected.delete(instanceId);
}

function afterRemoval() {
  updateBulkBar();
  if (_allItems) {
    syncFilterCacheAfterMutation();
    renderFilteredPage(_currentPage);
    return;
  }
  rerenderTbody();
  if (_items.length === 0) load(Math.max(1, _currentPage - 1));
}

async function removeSingleItem(instanceId) {
  const username = document.getElementById('username').value.trim();
  const item = _items.find(it => it.instance_id === instanceId);
  if (!item) return;
  if (!confirm(`Remove "${releaseLabel(item)}" from your collection?`)) return;

  try {
    await apiRemoveFromCollection(username, item);
    removeItemFromState(instanceId);
    afterRemoval();
    toast(`Removed "${releaseLabel(item)}" from your collection`, 'success');
  } catch (e) {
    toast(`Failed to remove "${releaseLabel(item)}": ${e.message}`, 'error');
  }
}

async function removeSelected() {
  const ids = [..._selected];
  if (!ids.length) return;
  if (!confirm(`Remove ${ids.length} item${ids.length > 1 ? 's' : ''} from your collection?`)) return;
  const username = document.getElementById('username').value.trim();

  let done = 0, failed = 0;
  for (const id of ids) {
    const item = _items.find(it => it.instance_id === id);
    if (!item) continue;
    try {
      await apiRemoveFromCollection(username, item);
      removeItemFromState(id);
      done++;
    } catch {
      failed++;
    }
  }
  afterRemoval();
  if (done) toast(`Removed ${done} item${done > 1 ? 's' : ''} from your collection`, 'success');
  if (failed) toast(`Failed to remove ${failed} item${failed > 1 ? 's' : ''}`, 'error');
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderThumb(url, title) {
  if (url) return `<img class="thumb" src="${esc(url)}" alt="${esc(title)}" loading="lazy"
    onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-ph',textContent:'♪'}))">`;
  return `<div class="thumb-ph">♪</div>`;
}

function visibleColumns() {
  return COLUMNS.filter(c => !c.optional || _collectionFields.length);
}

function renderRow(item) {
  const b = item.basic_information ?? {};
  const title  = b.title ?? '';
  const releaseUrl = b.id ? `https://www.discogs.com/release/${b.id}` : null;
  const isSelected = _selected.has(item.instance_id);

  const artistId = releaseArtistId(b);
  const labelId = releaseLabelId(b);
  const cellsByKey = {
    artist: linkOrText(artistId ? `https://www.discogs.com/artist/${artistId}` : null, releaseArtist(b), 'cell-link r-artist'),
    title: linkOrText(releaseUrl, title),
    format: renderFormatCell(b),
    label: linkOrText(labelId ? `https://www.discogs.com/label/${labelId}` : null, releaseLabelName(b)),
    catno: esc(releaseCatno(b)),
    year: esc(b.year ?? ''),
    rating: ratingStars(item.rating),
    folder: esc(folderNameFor(item)),
    notes: esc(itemNotesText(item)),
    added: `<span style="color:var(--text-muted);white-space:nowrap">${fmtDate(item.date_added)}</span>`,
  };
  const cells = visibleColumns().map(c => `<td>${cellsByKey[c.key] ?? ''}</td>`).join('');

  return `<tr id="row-${item.instance_id}" class="${isSelected ? 'selected' : ''}">
    <td class="col-check">
      <input type="checkbox" id="check-${item.instance_id}" ${isSelected ? 'checked' : ''}
        onchange="toggleSelect(${item.instance_id}, this.checked)">
    </td>
    <td class="col-thumb">${renderThumb(b.cover_image || b.thumb, title)}</td>
    ${cells}
    <td class="col-actions">
      <button class="btn btn-success btn-sm" onclick="openModal('single', ${item.instance_id})">List for sale</button>
      <button class="btn btn-danger btn-sm" onclick="removeSingleItem(${item.instance_id})">Remove</button>
    </td>
  </tr>`;
}

function sortBadge(key) {
  const idx = _sortChain.findIndex(s => s.key === key);
  if (idx === -1) return '';
  const arrow = _sortChain[idx].order === 'asc' ? '▲' : '▼';
  // Only show the priority number once a secondary+ key is active.
  const num = _sortChain.length > 1 ? `<sup>${idx + 1}</sup>` : '';
  return ` ${arrow}${num}`;
}

function renderTheadRow() {
  const cells = visibleColumns().map(c =>
    `<th class="sortable" onclick="onHeaderClick('${c.key}', event)" title="${c.clientOnly ? 'Sorts only the items on the current page — not supported by the Discogs API for the whole collection' : 'Click to sort, Shift+click to add as a secondary sort'}">${esc(c.label)}${c.clientOnly ? ' <span class="col-note">(page)</span>' : ''}${sortBadge(c.key)}</th>`
  ).join('');
  return `<tr>
    <th class="col-check"><input type="checkbox" id="check-all" onchange="toggleSelectAll(this.checked)"></th>
    <th class="col-thumb"></th>
    ${cells}
    <th></th>
  </tr>`;
}

function refreshThead() {
  const thead = document.querySelector('#root table thead');
  if (thead) thead.innerHTML = renderTheadRow();
}

// Plain click: replace the whole sort with just this column (existing behavior).
// Shift+click: append this column as a tie-breaker, or toggle its direction if
// it's already in the chain — reorders the current page only, since Discogs'
// API has no multi-column sort to request server-side.
function onHeaderClick(key, event) {
  if (event?.shiftKey) {
    const existing = _sortChain.find(s => s.key === key);
    if (existing) existing.order = existing.order === 'asc' ? 'desc' : 'asc';
    else _sortChain.push({ key, order: DEFAULT_DESC_KEYS.has(key) ? 'desc' : 'asc' });
    saveSortToStorage();
    // With filters active, the full dataset is already in memory — re-sort it
    // in place instead of load()ing, which would silently drop the filters.
    if (_allItems) { renderFilteredPage(_currentPage); return; }
    applyClientSort();
    rerenderTbody();
    refreshThead();
    return;
  }

  if (_sort === key) {
    _sortOrder = _sortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    _sort = key;
    _sortOrder = DEFAULT_DESC_KEYS.has(key) ? 'desc' : 'asc';
  }
  _sortChain = [{ key: _sort, order: _sortOrder }];
  saveSortToStorage();

  if (_allItems) {
    renderFilteredPage(1);
    return;
  }

  if (SERVER_SORT_KEYS.has(key)) {
    load(1);
  } else {
    applyClientSort();
    rerenderTbody();
    refreshThead();
  }
}

function rerenderTbody() {
  const tbody = document.querySelector('#root table tbody');
  if (tbody) tbody.innerHTML = _items.map(renderRow).join('');
}

function renderPagination(pag, page) {
  const total = pag.pages ?? 1;
  if (total <= 1) return '';
  const parts = [];
  parts.push(`<button onclick="goToPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`);
  let lo = Math.max(1, page-3), hi = Math.min(total, lo+6);
  if (hi-lo < 6) lo = Math.max(1, hi-6);
  if (lo > 1) { parts.push(`<button onclick="goToPage(1)">1</button>`); if (lo>2) parts.push(`<button disabled>…</button>`); }
  for (let p = lo; p <= hi; p++) parts.push(`<button class="${p===page?'active':''}" onclick="goToPage(${p})">${p}</button>`);
  if (hi < total) { if (hi<total-1) parts.push(`<button disabled>…</button>`); parts.push(`<button onclick="goToPage(${total})">${total}</button>`); }
  parts.push(`<button onclick="goToPage(${page+1})" ${page>=total?'disabled':''}>›</button>`);
  return `<div class="pagination">${parts.join('')}</div>`;
}

// Dispatches to either the normal server-paginated loader or the client-side
// filtered-page renderer, depending on whether global filters are active.
function goToPage(page) {
  if (_allItems) renderFilteredPage(page);
  else load(page);
}

// ── Folders & collection fields ─────────────────────────────────────────────
async function loadFolders(username) {
  const select = document.getElementById('folder');
  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/folders`);
    if (!resp.ok) return;
    const data = await resp.json();
    _folders = data.folders ?? [];
    const prev = select.value;
    select.innerHTML = _folders.map(f => `<option value="${f.id}">${esc(f.name)} (${f.count})</option>`).join('')
      || '<option value="0">All</option>';
    if (_folders.some(f => String(f.id) === prev)) select.value = prev;
    _lastFoldersUser = username;
  } catch { /* keep existing options */ }
}

async function loadCollectionFields(username) {
  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/fields`);
    _collectionFields = resp.ok ? ((await resp.json()).fields ?? []) : [];
  } catch { _collectionFields = []; }
}

// ── Global filters ──────────────────────────────────────────────────────────
function filterValueOf(item, key) {
  const b = item.basic_information ?? {};
  switch (key) {
    case 'artist': return (b.artists ?? []).map(a => a.name).filter(Boolean);
    // Every part of a format entry is filterable, not just its name — e.g.
    // "45 RPM" or "Limited Edition" from descriptions, not only "Vinyl"/"CD".
    case 'format': return (b.formats ?? []).flatMap(f => [f.name, f.text, ...(f.descriptions ?? [])]).filter(Boolean);
    case 'label': return (b.labels ?? []).map(l => l.name).filter(Boolean);
    case 'year': return b.year ? [String(b.year)] : [];
    case 'rating': return item.rating ? [String(item.rating)] : [];
    default: return [];
  }
}

function matchesActiveFilters(item) {
  return FILTER_COLUMNS.every(c => {
    const active = _activeFilters[c.key];
    return !active || filterValueOf(item, c.key).includes(active);
  });
}

function buildFilterOptions() {
  for (const c of FILTER_COLUMNS) {
    const values = new Set();
    for (const item of _allItems) filterValueOf(item, c.key).forEach(v => values.add(v));
    const numeric = c.key === 'year' || c.key === 'rating';
    const sorted = [...values].sort(numeric ? (a, b) => Number(b) - Number(a) : (a, b) => a.localeCompare(b));
    _filterCombos[c.key]?.setOptions(sorted);
  }
}

function resetFilters() {
  _allItems = null;
  _activeFilters = {};
  _filterCacheContext = null;
  const row = document.getElementById('filters-row');
  if (row) row.classList.remove('visible');
  const btn = document.getElementById('filters-toggle-btn');
  if (btn) { btn.style.display = ''; btn.disabled = false; btn.textContent = '🔍 Enable filters'; }
}

// Full-collection filter cache: fetching every page of a folder's releases
// (enableFilters' loop below) can take a while for large collections, so the
// result is persisted per (username, folder) in localStorage and reused on
// the next "Enable filters" instead of refetching. Discogs data can still
// change outside this UI, so entries expire after FILTER_CACHE_TTL_MS, and
// there's a manual "↻ Refresh" button (refreshFilterData) to bypass the
// cache on demand.
const FILTER_CACHE_PREFIX = 'discogs_collection_filter_cache:';
const FILTER_CACHE_TTL_MS = 60 * 60 * 1000; // 1 hour
let _filterCacheContext = null; // { username, folderId } that _allItems currently reflects

function filterCacheKey(username, folderId) {
  return `${FILTER_CACHE_PREFIX}${username}::${folderId}`;
}

function readFilterCache(username, folderId) {
  try {
    const raw = localStorage.getItem(filterCacheKey(username, folderId));
    if (!raw) return null;
    const { items, fetchedAt } = JSON.parse(raw);
    if (!Array.isArray(items) || Date.now() - fetchedAt > FILTER_CACHE_TTL_MS) return null;
    return items;
  } catch { return null; }
}

function writeFilterCache(username, folderId, items) {
  try {
    localStorage.setItem(filterCacheKey(username, folderId), JSON.stringify({ items, fetchedAt: Date.now() }));
  } catch { /* storage unavailable or quota exceeded — caching is best-effort */ }
}

// Keeps the persisted cache in sync after items are removed mid-session
// (see afterRemoval), so it doesn't go stale before FILTER_CACHE_TTL_MS even
// without a manual refresh.
function syncFilterCacheAfterMutation() {
  if (_allItems && _filterCacheContext) writeFilterCache(_filterCacheContext.username, _filterCacheContext.folderId, _allItems);
}

// forceRefresh bypasses any cached snapshot and refetches from Discogs.
async function enableFilters(forceRefresh = false) {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }
  const folderId = document.getElementById('folder').value || '0';
  const btn = document.getElementById('filters-toggle-btn');
  btn.disabled = true;

  if (!forceRefresh) {
    const cached = readFilterCache(username, folderId);
    if (cached) {
      _allItems = cached;
      _filterCacheContext = { username, folderId };
      buildFilterOptions();
      document.getElementById('filters-row').classList.add('visible');
      btn.style.display = 'none';
      renderFilteredPage(1);
      return;
    }
  }

  const items = [];
  try {
    let page = 1, pages = 1;
    do {
      btn.textContent = `Loading… ${items.length}`;
      const apiQs = new URLSearchParams({ sort: 'added', sort_order: 'desc', per_page: '100', page });
      const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/folders/${folderId}/releases?${apiQs}`);
      if (!resp.ok) throw new Error('request failed');
      const data = await resp.json();
      items.push(...(data.releases ?? []));
      pages = data.pagination?.pages ?? 1;
      page++;
    } while (page <= pages);
  } catch {
    toast("Couldn't load the full collection for filtering", 'error');
    btn.disabled = false;
    btn.textContent = '🔍 Enable filters';
    return;
  }

  _allItems = items;
  _filterCacheContext = { username, folderId };
  writeFilterCache(username, folderId, items);
  buildFilterOptions();
  document.getElementById('filters-row').classList.add('visible');
  btn.style.display = 'none';
  renderFilteredPage(1);
}

function refreshFilterData() {
  enableFilters(true);
}

function onFilterChange(key, value) {
  _activeFilters[key] = value;
  renderFilteredPage(1);
}

function clearFilters() {
  _activeFilters = {};
  FILTER_COLUMNS.forEach(c => _filterCombos[c.key]?.setValue(''));
  renderFilteredPage(1);
}

function renderFilteredPage(page) {
  const filtered = sortItems(_allItems.filter(matchesActiveFilters));
  const perPage = Number(document.getElementById('per_page').value);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  page = Math.min(Math.max(1, page), totalPages);
  _currentPage = page;
  _items = filtered.slice((page - 1) * perPage, page * perPage);
  _pagination = { page, pages: totalPages, per_page: perPage, items: filtered.length };
  clearSelection();
  renderTablePage();
}

// Called when username/folder changes — the loaded full dataset (if any) no
// longer matches, so drop back to normal server-paginated mode.
function onFolderChange() {
  resetFilters();
  load(1);
}

// Called for controls that don't invalidate an already-loaded full dataset
// (currently just per_page) — re-paginate in whichever mode is active.
function onControlChange() {
  goToPage(1);
}

async function loadAll() {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }
  resetFilters();
  if (username !== _lastFoldersUser) await Promise.all([loadFolders(username), loadCollectionFields(username)]);
  load(1);
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load(page) {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }

  const folderId = document.getElementById('folder').value || '0';
  const perPage  = document.getElementById('per_page').value;
  // Client-only sort keys (folder/notes) aren't valid API `sort` values — fall
  // back to 'added' server-side and apply the real sort after the page loads.
  const apiSort  = SERVER_SORT_KEYS.has(_sort) ? _sort : 'added';

  const qs = new URLSearchParams({ user: username, folder: folderId, sort: _sort, sort_order: _sortOrder, per_page: perPage, page });
  history.replaceState(null, '', '?' + qs);

  const apiQs = new URLSearchParams({ sort: apiSort, sort_order: _sortOrder, per_page: perPage, page });

  document.getElementById('root').innerHTML = '<div class="state">Loading…</div>';
  _items = [];
  clearSelection();

  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/folders/${folderId}/releases?${apiQs}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ message: resp.statusText }));
      document.getElementById('root').innerHTML = `<div class="state error">Error ${resp.status}: ${esc(err.message)}</div>`;
      return;
    }
    const data = await resp.json();
    _pagination  = data.pagination ?? {};
    _items       = data.releases ?? [];
    applyClientSort();
    _currentPage = Number(_pagination.page ?? page);
    renderTablePage();
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="state error">Network error: ${esc(e.message)}</div>`;
  }
}

// Renders the infobar + table + pagination from the current _items/_pagination/
// _currentPage — shared by the server-paginated path (load) and the client-side
// filtered path (renderFilteredPage).
function renderTablePage() {
  const total = Number(_pagination.items ?? _items.length);
  const perP  = Number(_pagination.per_page ?? document.getElementById('per_page').value);
  const from  = _items.length ? (_currentPage - 1) * perP + 1 : 0;
  const to    = Math.min(_currentPage * perP, total);
  const info  = total > 0 ? `Showing ${from}–${to} of ${total} items` : 'No items found';

  if (!_items.length) {
    document.getElementById('root').innerHTML = `<div class="infobar">${info}</div><div class="state">No items found.</div>`;
    return;
  }

  document.getElementById('root').innerHTML =
    `<div class="infobar">${info} · click a column header to sort, Shift+click to add a secondary sort</div>
     <div class="table-wrap"><table>
       <thead>${renderTheadRow()}</thead>
       <tbody>${_items.map(renderRow).join('')}</tbody>
     </table></div>` +
    renderPagination(_pagination, _currentPage);
}

// ── List for sale ─────────────────────────────────────────────────────────────
function fv(name) { return document.querySelector(`#listing-form [name="${name}"]`); }

let _modalMode = null;
let _modalInstanceId = null;
let _priceSuggestions = null;
let _priceManuallyEdited = false;

// Suggested prices come from Discogs' median-based price-suggestions endpoint,
// keyed by condition grade; rounded up so the seller doesn't undercut the median.
function updatePriceSuggestionUI() {
  const hint = document.getElementById('price-suggestion');
  const condition = fv('condition').value;
  const sug = _priceSuggestions?.[condition];
  if (!sug) { hint.textContent = ''; return; }
  const rounded = Math.ceil(Number(sug.value));
  hint.textContent = `Median-based suggestion: ${sug.currency} ${Number(sug.value).toFixed(2)} → prefilled ${sug.currency} ${rounded}`;
  if (!_priceManuallyEdited) fv('price').value = rounded;
}

// ── Bulk queue: reopens the single-item modal for each selected item in turn,
// so condition/price/etc. are set individually per lot instead of shared. ──────
let _queue = [];
let _queueTotal = 0;
let _queueDone = 0;

function startQueue() {
  const ids = [..._selected];
  if (!ids.length) return;
  _queue = ids;
  _queueTotal = ids.length;
  _queueDone = 0;
  advanceQueue();
}

function advanceQueue() {
  if (!_queue.length) {
    if (_queueDone) toast(`Listed ${_queueDone} item${_queueDone > 1 ? 's' : ''} for sale`, 'success');
    _queueTotal = 0;
    return;
  }
  openModal('queue', _queue[0]);
}

function openModal(mode, instanceId = null) {
  _modalMode = mode;
  _modalInstanceId = instanceId;
  _priceSuggestions = null;
  _priceManuallyEdited = false;

  const form = document.getElementById('listing-form');
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = false;
  saveBtn.textContent = 'List for sale';

  const releaseInfo = document.getElementById('modal-release-info');
  const warnNote    = document.getElementById('modal-warn');

  form.reset();
  fv('status').value = 'For Sale';
  document.getElementById('price-suggestion').textContent = '';

  const item = _items.find(it => it.instance_id === instanceId);
  const b = item?.basic_information ?? {};
  const queuePos = mode === 'queue' ? `${_queueTotal - _queue.length + 1} of ${_queueTotal}` : null;
  document.getElementById('modal-title').textContent = queuePos ? `List for Sale (${queuePos})` : 'List for Sale';
  releaseInfo.style.display = '';
  const label = [releaseArtist(b), b.title, releaseFormat(b), b.year].filter(Boolean).join(' — ');
  releaseInfo.innerHTML = `${esc(label)} &nbsp;·&nbsp; <a class="r-link" href="${salesHistoryUrl(item.id)}" target="_blank">Sales history &rarr;</a>`;
  warnNote.textContent = 'Creating this listing will remove the release from your collection.'
    + (queuePos && _queue.length > 1 ? ` ${_queue.length - 1} more queued after this one.` : '');
  apiPriceSuggestions(item.id).then(sugs => { _priceSuggestions = sugs; updatePriceSuggestionUI(); });

  document.getElementById('modal-overlay').classList.add('open');
  fv('condition').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Cancel/× abandon the current item; if more are queued, confirm before dropping them too.
function cancelModal() {
  const remaining = _modalMode === 'queue' ? _queue.length - 1 : 0;
  if (remaining > 0 &&
      !confirm(`Stop before listing the remaining ${remaining} item${remaining > 1 ? 's' : ''}? They'll stay in your collection.`)) {
    return;
  }
  _queue = [];
  _queueTotal = 0;
  closeModal();
}

async function submitModal() {
  const username = document.getElementById('username').value.trim();
  const condition = fv('condition').value;
  const price     = parseFloat(fv('price').value);
  const status    = fv('status').value;
  const saveBtn   = document.getElementById('modal-save-btn');

  if (!condition) { toast('Select a media condition', 'error'); fv('condition').focus(); return; }
  if (isNaN(price)) { toast('Enter a valid price', 'error'); fv('price').focus(); return; }

  const item = _items.find(it => it.instance_id === _modalInstanceId);
  if (!item) { closeModal(); return; }

  const body = {
    condition,
    sleeve_condition: fv('sleeve_condition').value || undefined,
    price,
    status,
    allow_offers: fv('allow_offers').checked,
    comments:     fv('comments').value || undefined,
    location:     fv('location').value || undefined,
    external_id:  fv('external_id').value || undefined,
    weight:          parseNumAuto(fv('weight').value),
    format_quantity: parseNumAuto(fv('format_quantity').value),
  };
  Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);

  saveBtn.disabled = true;
  saveBtn.textContent = 'Listing…';

  try {
    const res = await apiCreateListing({ release_id: item.id, ...body });
    try {
      await apiRemoveFromCollection(username, item);
    } catch (e) {
      toast(`Listed #${res.listing_id} but couldn't remove it from your collection: ${e.message}`, 'error');
    }
    removeItemFromState(item.instance_id);
    if (_modalMode === 'queue') { _queue.shift(); _queueDone++; }
    else toast(`Listed #${res.listing_id} for sale`, 'success');
    afterRemoval();
    closeModal();
    if (_modalMode === 'queue') advanceQueue();
  } catch (e) {
    toast(`Failed to list "${releaseLabel(item)}": ${e.message}`, 'error');
    saveBtn.disabled = false;
    saveBtn.textContent = 'List for sale';
  }
}

// ── Close modal on overlay click ──────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) cancelModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') cancelModal(); });

fv('condition').addEventListener('change', updatePriceSuggestionUI);
fv('price').addEventListener('input', () => { _priceManuallyEdited = true; });

// ── Restore URL state or auto-load the authenticated user ─────────────────────
(async function () {
  const p = new URLSearchParams(location.search);
  if (p.get('sort')) {
    _sort      = p.get('sort');
    _sortOrder = p.get('sort_order') ?? 'desc';
    _sortChain = [{ key: _sort, order: _sortOrder }];
  } else {
    const stored = loadSortFromStorage();
    if (stored) { _sortChain = stored; _sort = stored[0].key; _sortOrder = stored[0].order; }
  }

  if (p.get('user')) {
    document.getElementById('username').value = p.get('user');
    document.getElementById('per_page').value = p.get('per_page') ?? '50';
    await Promise.all([loadFolders(p.get('user')), loadCollectionFields(p.get('user'))]);
    if (p.get('folder')) document.getElementById('folder').value = p.get('folder');
    load(parseInt(p.get('page') ?? '1', 10));
    return;
  }
  // No URL params — check if OAuth is active and auto-load that user's collection.
  try {
    const data = await fetch(`${BASE}/oauth/status`).then(r => r.json());
    if (data.authorized && data.username) {
      document.getElementById('username').value = data.username;
      loadAll();
    }
  } catch { /* ignore, user can enter username manually */ }
})();

document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') loadAll(); });
</script>
</body>
