<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discogs Collection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a2e; background: #f5f5f5; }

    /* ── Top bar ── */
    .topbar { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
    .topbar h1 { font-size: 17px; font-weight: 700; }
    .topbar a { color: #90a4ae; font-size: 13px; text-decoration: none; }
    .topbar a:hover { color: #fff; }

    /* ── Controls ── */
    .controls { background: #fff; border-bottom: 1px solid #ddd; padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .controls label { font-size: 12px; color: #666; font-weight: 500; }
    .controls input[type=text] { border: 1px solid #ccc; border-radius: 4px; padding: 6px 10px; font-size: 14px; width: 160px; outline: none; }
    .controls input[type=text]:focus { border-color: #1565c0; }
    .controls select { border: 1px solid #ccc; border-radius: 4px; padding: 6px 8px; font-size: 13px; background: #fff; outline: none; }
    .sep { width: 1px; height: 24px; background: #e0e0e0; margin: 0 2px; }
    .btn { background: #1565c0; color: #fff; border: none; border-radius: 4px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
    .btn:hover { background: #0d47a1; }
    .btn.btn-success { background: #2e7d32; }
    .btn.btn-success:hover { background: #1b5e20; }
    .btn.btn-danger { background: #c62828; }
    .btn.btn-danger:hover { background: #b71c1c; }
    .btn.btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn.btn-icon { padding: 4px 7px; font-size: 13px; border-radius: 3px; }
    .btn:disabled { opacity: .5; cursor: default; }
    .ml-auto { margin-left: auto; }

    /* ── Bulk toolbar ── */
    #bulk-bar { background: #e8eaf6; border-bottom: 1px solid #c5cae9; padding: 8px 20px;
                display: none; align-items: center; gap: 10px; flex-wrap: wrap; }
    #bulk-bar.visible { display: flex; }
    #bulk-count { font-weight: 600; font-size: 13px; color: #283593; }

    /* ── Info bar ── */
    .infobar { padding: 7px 20px; font-size: 13px; color: #555; background: #fafafa; border-bottom: 1px solid #eee; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead th { background: #f0f0f5; text-align: left; padding: 8px 10px; font-size: 12px; font-weight: 700;
               color: #444; border-bottom: 2px solid #ddd; white-space: nowrap; }
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { background: #e8eaf6; }
    thead th .col-note { font-weight: 400; color: #999; font-size: 10px; }
    td { padding: 8px 10px; border-bottom: 1px solid #efefef; vertical-align: middle; }
    tr:hover td { background: #fafafe; }
    tr.selected td { background: #e8eaf6; }

    /* ── Checkbox ── */
    input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #1565c0; }
    .col-check { width: 36px; }
    .col-thumb { width: 58px; }
    .col-actions { width: 110px; white-space: nowrap; }

    /* ── Thumbnail ── */
    .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 3px; display: block; }
    .thumb-ph { width: 50px; height: 50px; background: #e8e8e8; border-radius: 3px; display: flex;
                align-items: center; justify-content: center; font-size: 22px; color: #ccc; }

    /* ── Release info ── */
    .r-artist { font-weight: 600; }
    .r-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .r-link { font-size: 12px; color: #1565c0; text-decoration: none; }
    .r-link:hover { text-decoration: underline; }

    /* ── Rating ── */
    .rating { color: #f57f17; white-space: nowrap; }
    .rating .empty { color: #ddd; }

    /* ── Pagination ── */
    .pagination { padding: 14px 20px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
    .pagination button { border: 1px solid #ccc; background: #fff; border-radius: 4px; padding: 5px 10px;
                         font-size: 13px; cursor: pointer; min-width: 34px; }
    .pagination button:hover:not(:disabled) { background: #e8eaf6; }
    .pagination button.active { background: #1565c0; color: #fff; border-color: #1565c0; font-weight: 700; }
    .pagination button:disabled { opacity: .35; cursor: default; }

    /* ── States ── */
    .state { text-align: center; padding: 70px 20px; color: #999; font-size: 15px; }
    .state.error { color: #c62828; }

    /* ── Modal ── */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
                     z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    #modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 6px; width: 100%; max-width: 560px; max-height: 90vh;
             display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
    .modal-header h2 { font-size: 16px; flex: 1; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }

    /* ── Form ── */
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
    .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row textarea {
      width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #1565c0; }
    .form-row textarea { resize: vertical; min-height: 70px; }
    .form-hint { font-size: 11px; color: #999; margin-top: 3px; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-check { display: flex; align-items: center; gap: 8px; }
    .form-check input { width: auto; }
    .form-section { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase;
                    letter-spacing: .5px; margin: 16px 0 10px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    .release-info { background: #f5f5f5; border-radius: 4px; padding: 8px 12px; font-size: 13px;
                    margin-bottom: 14px; color: #444; }
    .warn-note { background: #fff3e0; color: #e65100; border-radius: 4px; padding: 8px 12px;
                 font-size: 12px; margin-bottom: 14px; }

    /* ── Toasts ── */
    #toasts { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #333; color: #fff; padding: 10px 16px; border-radius: 5px; font-size: 13px;
             opacity: 0; transform: translateX(20px); transition: all .25s; max-width: 320px; }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast.toast-success { background: #2e7d32; }
    .toast.toast-error { background: #c62828; }
    .toast.toast-info { background: #1565c0; }

  </style>
</head>
<body>

<div class="topbar">
  <h1>Discogs Collection</h1>
  <a id="swagger-link" href="#">← Swagger UI</a>
  <a id="inventory-link" href="#">Inventory →</a>
</div>

<div class="controls">
  <label>Username</label>
  <input type="text" id="username" placeholder="e.g. 360vinyl">

  <div class="sep"></div>

  <label>Folder</label>
  <select id="folder" onchange="load(1)">
    <option value="0">All</option>
  </select>

  <div class="sep"></div>

  <label>Per page</label>
  <select id="per_page" onchange="load(1)">
    <option value="25">25</option>
    <option value="50" selected>50</option>
    <option value="100">100</option>
  </select>

  <button class="btn" onclick="loadAll()">Load</button>
</div>

<div id="bulk-bar">
  <span id="bulk-count"></span>
  <button class="btn btn-success btn-sm" onclick="startQueue()">List selected for sale…</button>
  <button class="btn btn-sm" style="margin-left:auto" onclick="clearSelection()">✕ Clear</button>
</div>

<div id="root">
  <div class="state">Enter a Discogs username and click Load.</div>
</div>

<!-- ── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">List for Sale</h2>
      <button class="modal-close" onclick="cancelModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-release-info" class="release-info" style="display:none"></div>
      <div class="warn-note" id="modal-warn"></div>
      <form id="listing-form" onsubmit="return false">
        <div class="form-section">Grading</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Media Condition <span style="color:#c62828">*</span></label>
            <select name="condition">
              <option value="">— select —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
            </select>
          </div>
          <div class="form-row">
            <label>Sleeve Condition</label>
            <select name="sleeve_condition">
              <option value="">— not graded —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
              <option>Generic</option>
              <option>Not Graded</option>
              <option>No Cover</option>
            </select>
          </div>
        </div>

        <div class="form-section">Sale</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Price <span style="color:#c62828">*</span></label>
            <input type="text" name="price" placeholder="9.99">
            <div class="form-hint" id="price-suggestion"></div>
          </div>
          <div class="form-row">
            <label>Status <span style="color:#c62828">*</span></label>
            <select name="status">
              <option value="For Sale">For Sale</option>
              <option value="Draft">Draft</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" name="allow_offers" id="allow_offers">
            <label for="allow_offers" style="display:inline;font-weight:400;margin:0">Allow offers</label>
          </div>
        </div>

        <div class="form-row">
          <label>Comments <span style="color:#888;font-weight:400">(public — shown to buyers)</span></label>
          <textarea name="comments" placeholder="Condition notes, pressing info…"></textarea>
        </div>

        <div class="form-section">Seller-only fields</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Location</label>
            <input type="text" name="location" placeholder="Shelf A-3">
          </div>
          <div class="form-row">
            <label>Private Notes</label>
            <input type="text" name="external_id" placeholder="Internal reference">
          </div>
        </div>
        <div class="form-2col">
          <div class="form-row">
            <label>Weight (g)</label>
            <input type="text" name="weight" placeholder="auto or e.g. 200">
          </div>
          <div class="form-row">
            <label>Counts As</label>
            <input type="text" name="format_quantity" placeholder="auto or 1">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:#757575" onclick="cancelModal()">Cancel</button>
      <button class="btn btn-success" id="modal-save-btn" onclick="submitModal()">List for sale</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ── Base URL (works on any subpath) ─────────────────────────────────────────
const BASE = window.location.pathname.replace(/\/collection\/?$/, '');
document.getElementById('swagger-link').href = BASE || '/';
document.getElementById('inventory-link').href = `${BASE}/inventory`;

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) { return iso ? iso.slice(0, 10) : ''; }
function parseNumAuto(v) {
  if (!v || v.trim() === '') return undefined;
  if (v.trim().toLowerCase() === 'auto') return 'auto';
  const n = parseFloat(v);
  return isNaN(n) ? undefined : n;
}
function salesHistoryUrl(releaseId) { return `https://www.discogs.com/sell/history/${releaseId}`; }

function releaseArtist(basic) { return basic?.artists?.[0]?.name ?? ''; }
function releaseFormat(basic) {
  const f = basic?.formats?.[0];
  if (!f) return '';
  return [f.name, f.descriptions?.length ? f.descriptions.join(', ') : null].filter(Boolean).join(' · ');
}
function releaseCatno(basic) { return basic?.labels?.[0]?.catno ?? ''; }
function releaseLabelName(basic) { return basic?.labels?.[0]?.name ?? ''; }
function releaseLabel(item) {
  const b = item?.basic_information ?? {};
  return [releaseArtist(b), b.title].filter(Boolean).join(' – ');
}
function ratingStars(n) {
  n = Number(n) || 0;
  let html = '<span class="rating">';
  for (let i = 1; i <= 5; i++) html += i <= n ? '★' : '<span class="empty">★</span>';
  return html + '</span>';
}

// ── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ── State ───────────────────────────────────────────────────────────────────
let _items = [];           // current page of collection items
let _selected = new Set(); // selected instance_ids
let _pagination = {};
let _currentPage = 1;
let _lastFoldersUser = null;
let _folders = [];            // [{id, name, count}, ...]
let _collectionFields = [];   // user-defined collection notes fields: [{id, name, ...}, ...]
let _sort = 'added';
let _sortOrder = 'desc';

// Discogs' collection-releases endpoint only accepts these as the `sort` query
// param — folder/notes have no server-side sort, so those are sorted client-side
// (current page only) instead.
const SERVER_SORT_KEYS = new Set(['artist', 'title', 'format', 'label', 'catno', 'year', 'rating', 'added']);
const DEFAULT_DESC_KEYS = new Set(['added', 'rating']);
const COLUMNS = [
  { key: 'artist', label: 'Artist' },
  { key: 'title', label: 'Title' },
  { key: 'format', label: 'Format' },
  { key: 'label', label: 'Label' },
  { key: 'catno', label: 'Cat#' },
  { key: 'year', label: 'Year' },
  { key: 'rating', label: 'Rating' },
  { key: 'folder', label: 'Folder', clientOnly: true },
  { key: 'notes', label: 'Notes', clientOnly: true, optional: true },
  { key: 'added', label: 'Added' },
];

function folderNameFor(item) {
  const fid = item.folder_id ?? document.getElementById('folder').value;
  return _folders.find(f => String(f.id) === String(fid))?.name ?? '';
}

function itemNotesText(item) {
  if (!_collectionFields.length) return '';
  const byId = Object.fromEntries(_collectionFields.map(f => [f.id, f.name]));
  return (item.notes ?? [])
    .filter(n => n.value)
    .map(n => `${byId[n.field_id] ?? ''}: ${n.value}`)
    .join('; ');
}

// ── API ──────────────────────────────────────────────────────────────────────
async function apiCreateListing(body) {
  const r = await fetch(`${BASE}/marketplace/listings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.message || r.statusText);
  return data;
}

async function apiPriceSuggestions(releaseId) {
  try {
    const r = await fetch(`${BASE}/marketplace/price_suggestions/${releaseId}`);
    if (!r.ok) return null;
    return await r.json(); // { "Mint (M)": {currency, value}, ... }
  } catch { return null; }
}

async function apiRemoveFromCollection(username, item) {
  const folderId = item.folder_id ?? document.getElementById('folder').value ?? 0;
  const url = `${BASE}/users/${encodeURIComponent(username)}/collection/folders/${folderId}/releases/${item.id}/instances/${item.instance_id}`;
  const r = await fetch(url, { method: 'DELETE' });
  if (!r.ok && r.status !== 204) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || r.statusText);
  }
}

// ── Selection ────────────────────────────────────────────────────────────────
function toggleSelect(instanceId, checked) {
  if (checked) _selected.add(instanceId); else _selected.delete(instanceId);
  const row = document.getElementById(`row-${instanceId}`);
  if (row) row.classList.toggle('selected', checked);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  _items.forEach(it => {
    _selected[checked ? 'add' : 'delete'](it.instance_id);
    const row = document.getElementById(`row-${it.instance_id}`);
    if (row) row.classList.toggle('selected', checked);
    const cb = document.getElementById(`check-${it.instance_id}`);
    if (cb) cb.checked = checked;
  });
  updateBulkBar();
}

function clearSelection() {
  _selected.clear();
  document.querySelectorAll('input[id^=check-]').forEach(cb => cb.checked = false);
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  const checkAll = document.getElementById('check-all');
  if (checkAll) checkAll.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  const n = _selected.size;
  const bar = document.getElementById('bulk-bar');
  bar.classList.toggle('visible', n > 0);
  document.getElementById('bulk-count').textContent = `${n} item${n !== 1 ? 's' : ''} selected`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderThumb(url, title) {
  if (url) return `<img class="thumb" src="${esc(url)}" alt="${esc(title)}" loading="lazy"
    onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-ph',textContent:'♪'}))">`;
  return `<div class="thumb-ph">♪</div>`;
}

function visibleColumns() {
  return COLUMNS.filter(c => !c.optional || _collectionFields.length);
}

function renderRow(item) {
  const b = item.basic_information ?? {};
  const title  = b.title ?? '';
  const releaseUrl = b.id ? `https://www.discogs.com/release/${b.id}` : null;
  const isSelected = _selected.has(item.instance_id);

  const cellsByKey = {
    artist: esc(releaseArtist(b)),
    title: `${esc(title)}${releaseUrl ? `<div class="r-meta"><a class="r-link" href="${releaseUrl}" target="_blank">release #${b.id}</a></div>` : ''}`,
    format: esc(releaseFormat(b)),
    label: esc(releaseLabelName(b)),
    catno: esc(releaseCatno(b)),
    year: esc(b.year ?? ''),
    rating: ratingStars(item.rating),
    folder: esc(folderNameFor(item)),
    notes: esc(itemNotesText(item)),
    added: `<span style="color:#888;white-space:nowrap">${fmtDate(item.date_added)}</span>`,
  };
  const cells = visibleColumns().map(c => `<td>${cellsByKey[c.key] ?? ''}</td>`).join('');

  return `<tr id="row-${item.instance_id}" class="${isSelected ? 'selected' : ''}">
    <td class="col-check">
      <input type="checkbox" id="check-${item.instance_id}" ${isSelected ? 'checked' : ''}
        onchange="toggleSelect(${item.instance_id}, this.checked)">
    </td>
    <td class="col-thumb">${renderThumb(b.cover_image || b.thumb, title)}</td>
    ${cells}
    <td class="col-actions">
      <button class="btn btn-success btn-sm" onclick="openModal('single', ${item.instance_id})">List for sale</button>
    </td>
  </tr>`;
}

function sortArrow(key) {
  if (_sort !== key) return '';
  return _sortOrder === 'asc' ? ' ▲' : ' ▼';
}

function renderTheadRow() {
  const cells = visibleColumns().map(c =>
    `<th class="sortable" onclick="onHeaderClick('${c.key}')" title="${c.clientOnly ? 'Sorts only the items on the current page — not supported by the Discogs API for the whole collection' : 'Click to sort'}">${esc(c.label)}${c.clientOnly ? ' <span class="col-note">(page)</span>' : ''}${sortArrow(c.key)}</th>`
  ).join('');
  return `<tr>
    <th class="col-check"><input type="checkbox" id="check-all" onchange="toggleSelectAll(this.checked)"></th>
    <th class="col-thumb"></th>
    ${cells}
    <th></th>
  </tr>`;
}

// Applies the current sort client-side; used for folder/notes (no API support)
// and, after each load(), as a no-op guard for server-sorted keys.
function applyClientSort() {
  if (SERVER_SORT_KEYS.has(_sort)) return;
  const dir = _sortOrder === 'asc' ? 1 : -1;
  const valueOf = _sort === 'folder'
    ? it => folderNameFor(it).toLowerCase()
    : it => itemNotesText(it).toLowerCase();
  _items.sort((a, b) => {
    const av = valueOf(a), bv = valueOf(b);
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

function onHeaderClick(key) {
  if (_sort === key) {
    _sortOrder = _sortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    _sort = key;
    _sortOrder = DEFAULT_DESC_KEYS.has(key) ? 'desc' : 'asc';
  }
  if (SERVER_SORT_KEYS.has(key)) {
    load(1);
  } else {
    applyClientSort();
    rerenderTbody();
    const thead = document.querySelector('#root table thead');
    if (thead) thead.innerHTML = renderTheadRow();
  }
}

function rerenderTbody() {
  const tbody = document.querySelector('#root table tbody');
  if (tbody) tbody.innerHTML = _items.map(renderRow).join('');
}

function renderPagination(pag, page) {
  const total = pag.pages ?? 1;
  if (total <= 1) return '';
  const parts = [];
  parts.push(`<button onclick="load(${page-1})" ${page<=1?'disabled':''}>‹</button>`);
  let lo = Math.max(1, page-3), hi = Math.min(total, lo+6);
  if (hi-lo < 6) lo = Math.max(1, hi-6);
  if (lo > 1) { parts.push(`<button onclick="load(1)">1</button>`); if (lo>2) parts.push(`<button disabled>…</button>`); }
  for (let p = lo; p <= hi; p++) parts.push(`<button class="${p===page?'active':''}" onclick="load(${p})">${p}</button>`);
  if (hi < total) { if (hi<total-1) parts.push(`<button disabled>…</button>`); parts.push(`<button onclick="load(${total})">${total}</button>`); }
  parts.push(`<button onclick="load(${page+1})" ${page>=total?'disabled':''}>›</button>`);
  return `<div class="pagination">${parts.join('')}</div>`;
}

// ── Folders & collection fields ─────────────────────────────────────────────
async function loadFolders(username) {
  const select = document.getElementById('folder');
  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/folders`);
    if (!resp.ok) return;
    const data = await resp.json();
    _folders = data.folders ?? [];
    const prev = select.value;
    select.innerHTML = _folders.map(f => `<option value="${f.id}">${esc(f.name)} (${f.count})</option>`).join('')
      || '<option value="0">All</option>';
    if (_folders.some(f => String(f.id) === prev)) select.value = prev;
    _lastFoldersUser = username;
  } catch { /* keep existing options */ }
}

async function loadCollectionFields(username) {
  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/fields`);
    _collectionFields = resp.ok ? ((await resp.json()).fields ?? []) : [];
  } catch { _collectionFields = []; }
}

async function loadAll() {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }
  if (username !== _lastFoldersUser) await Promise.all([loadFolders(username), loadCollectionFields(username)]);
  load(1);
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load(page) {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }

  const folderId = document.getElementById('folder').value || '0';
  const perPage  = document.getElementById('per_page').value;
  // Client-only sort keys (folder/notes) aren't valid API `sort` values — fall
  // back to 'added' server-side and apply the real sort after the page loads.
  const apiSort  = SERVER_SORT_KEYS.has(_sort) ? _sort : 'added';

  const qs = new URLSearchParams({ user: username, folder: folderId, sort: _sort, sort_order: _sortOrder, per_page: perPage, page });
  history.replaceState(null, '', '?' + qs);

  const apiQs = new URLSearchParams({ sort: apiSort, sort_order: _sortOrder, per_page: perPage, page });

  document.getElementById('root').innerHTML = '<div class="state">Loading…</div>';
  _items = [];
  clearSelection();

  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/collection/folders/${folderId}/releases?${apiQs}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ message: resp.statusText }));
      document.getElementById('root').innerHTML = `<div class="state error">Error ${resp.status}: ${esc(err.message)}</div>`;
      return;
    }
    const data = await resp.json();
    _pagination  = data.pagination ?? {};
    _items       = data.releases ?? [];
    applyClientSort();
    _currentPage = Number(_pagination.page ?? page);

    const total = Number(_pagination.items ?? _items.length);
    const perP  = Number(perPage);
    const from  = (_currentPage - 1) * perP + 1;
    const to    = Math.min(_currentPage * perP, total);
    const info  = total > 0 ? `Showing ${from}–${to} of ${total} items` : 'No items found';

    if (!_items.length) {
      document.getElementById('root').innerHTML = `<div class="infobar">${info}</div><div class="state">No items found.</div>`;
      return;
    }

    document.getElementById('root').innerHTML =
      `<div class="infobar">${info} · click a column header to sort</div>
       <div class="table-wrap"><table>
         <thead>${renderTheadRow()}</thead>
         <tbody>${_items.map(renderRow).join('')}</tbody>
       </table></div>` +
      renderPagination(_pagination, _currentPage);
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="state error">Network error: ${esc(e.message)}</div>`;
  }
}

// ── List for sale ─────────────────────────────────────────────────────────────
function fv(name) { return document.querySelector(`#listing-form [name="${name}"]`); }

let _modalMode = null;
let _modalInstanceId = null;
let _priceSuggestions = null;
let _priceManuallyEdited = false;

// Suggested prices come from Discogs' median-based price-suggestions endpoint,
// keyed by condition grade; rounded up so the seller doesn't undercut the median.
function updatePriceSuggestionUI() {
  const hint = document.getElementById('price-suggestion');
  const condition = fv('condition').value;
  const sug = _priceSuggestions?.[condition];
  if (!sug) { hint.textContent = ''; return; }
  const rounded = Math.ceil(Number(sug.value));
  hint.textContent = `Median-based suggestion: ${sug.currency} ${Number(sug.value).toFixed(2)} → prefilled ${sug.currency} ${rounded}`;
  if (!_priceManuallyEdited) fv('price').value = rounded;
}

// ── Bulk queue: reopens the single-item modal for each selected item in turn,
// so condition/price/etc. are set individually per lot instead of shared. ──────
let _queue = [];
let _queueTotal = 0;
let _queueDone = 0;

function startQueue() {
  const ids = [..._selected];
  if (!ids.length) return;
  _queue = ids;
  _queueTotal = ids.length;
  _queueDone = 0;
  advanceQueue();
}

function advanceQueue() {
  if (!_queue.length) {
    if (_queueDone) toast(`Listed ${_queueDone} item${_queueDone > 1 ? 's' : ''} for sale`, 'success');
    _queueTotal = 0;
    return;
  }
  openModal('queue', _queue[0]);
}

function openModal(mode, instanceId = null) {
  _modalMode = mode;
  _modalInstanceId = instanceId;
  _priceSuggestions = null;
  _priceManuallyEdited = false;

  const form = document.getElementById('listing-form');
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = false;
  saveBtn.textContent = 'List for sale';

  const releaseInfo = document.getElementById('modal-release-info');
  const warnNote    = document.getElementById('modal-warn');

  form.reset();
  fv('status').value = 'For Sale';
  document.getElementById('price-suggestion').textContent = '';

  const item = _items.find(it => it.instance_id === instanceId);
  const b = item?.basic_information ?? {};
  const queuePos = mode === 'queue' ? `${_queueTotal - _queue.length + 1} of ${_queueTotal}` : null;
  document.getElementById('modal-title').textContent = queuePos ? `List for Sale (${queuePos})` : 'List for Sale';
  releaseInfo.style.display = '';
  const label = [releaseArtist(b), b.title, releaseFormat(b), b.year].filter(Boolean).join(' — ');
  releaseInfo.innerHTML = `${esc(label)} &nbsp;·&nbsp; <a class="r-link" href="${salesHistoryUrl(item.id)}" target="_blank">Sales history &rarr;</a>`;
  warnNote.textContent = 'Creating this listing will remove the release from your collection.'
    + (queuePos && _queue.length > 1 ? ` ${_queue.length - 1} more queued after this one.` : '');
  apiPriceSuggestions(item.id).then(sugs => { _priceSuggestions = sugs; updatePriceSuggestionUI(); });

  document.getElementById('modal-overlay').classList.add('open');
  fv('condition').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Cancel/× abandon the current item; if more are queued, confirm before dropping them too.
function cancelModal() {
  const remaining = _modalMode === 'queue' ? _queue.length - 1 : 0;
  if (remaining > 0 &&
      !confirm(`Stop before listing the remaining ${remaining} item${remaining > 1 ? 's' : ''}? They'll stay in your collection.`)) {
    return;
  }
  _queue = [];
  _queueTotal = 0;
  closeModal();
}

async function submitModal() {
  const username = document.getElementById('username').value.trim();
  const condition = fv('condition').value;
  const price     = parseFloat(fv('price').value);
  const status    = fv('status').value;
  const saveBtn   = document.getElementById('modal-save-btn');

  if (!condition) { toast('Select a media condition', 'error'); fv('condition').focus(); return; }
  if (isNaN(price)) { toast('Enter a valid price', 'error'); fv('price').focus(); return; }

  const item = _items.find(it => it.instance_id === _modalInstanceId);
  if (!item) { closeModal(); return; }

  const body = {
    condition,
    sleeve_condition: fv('sleeve_condition').value || undefined,
    price,
    status,
    allow_offers: fv('allow_offers').checked,
    comments:     fv('comments').value || undefined,
    location:     fv('location').value || undefined,
    external_id:  fv('external_id').value || undefined,
    weight:          parseNumAuto(fv('weight').value),
    format_quantity: parseNumAuto(fv('format_quantity').value),
  };
  Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);

  saveBtn.disabled = true;
  saveBtn.textContent = 'Listing…';

  try {
    const res = await apiCreateListing({ release_id: item.id, ...body });
    try {
      await apiRemoveFromCollection(username, item);
    } catch (e) {
      toast(`Listed #${res.listing_id} but couldn't remove it from your collection: ${e.message}`, 'error');
    }
    _items = _items.filter(it => it.instance_id !== item.instance_id);
    _selected.delete(item.instance_id);
    if (_modalMode === 'queue') { _queue.shift(); _queueDone++; }
    else toast(`Listed #${res.listing_id} for sale`, 'success');
    updateBulkBar();
    rerenderTbody();
    if (_items.length === 0) load(Math.max(1, _currentPage - 1));
    closeModal();
    if (_modalMode === 'queue') advanceQueue();
  } catch (e) {
    toast(`Failed to list "${releaseLabel(item)}": ${e.message}`, 'error');
    saveBtn.disabled = false;
    saveBtn.textContent = 'List for sale';
  }
}

// ── Close modal on overlay click ──────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) cancelModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') cancelModal(); });

fv('condition').addEventListener('change', updatePriceSuggestionUI);
fv('price').addEventListener('input', () => { _priceManuallyEdited = true; });

// ── Restore URL state or auto-load the authenticated user ─────────────────────
(async function () {
  const p = new URLSearchParams(location.search);
  if (p.get('user')) {
    document.getElementById('username').value = p.get('user');
    _sort      = p.get('sort') ?? 'added';
    _sortOrder = p.get('sort_order') ?? 'desc';
    document.getElementById('per_page').value = p.get('per_page') ?? '50';
    await Promise.all([loadFolders(p.get('user')), loadCollectionFields(p.get('user'))]);
    if (p.get('folder')) document.getElementById('folder').value = p.get('folder');
    load(parseInt(p.get('page') ?? '1', 10));
    return;
  }
  // No URL params — check if OAuth is active and auto-load that user's collection.
  try {
    const data = await fetch(`${BASE}/oauth/status`).then(r => r.json());
    if (data.authorized && data.username) {
      document.getElementById('username').value = data.username;
      loadAll();
    }
  } catch { /* ignore, user can enter username manually */ }
})();

document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') loadAll(); });
</script>
</body>
