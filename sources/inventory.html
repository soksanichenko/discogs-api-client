<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discogs Inventory</title>
  <link rel="stylesheet" href="theme.css?v=__THEME_CSS_VERSION__">
  <style>
    /* ── Condition badge ── */
    .cond { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 11px; font-weight: 700;
            color: #fff; white-space: nowrap; line-height: 1.6; }
    .cond-row { display: flex; flex-direction: column; gap: 3px; }
    .cond-label { font-size: 11px; color: var(--text-muted); }

    /* ── Price ── */
    .price { font-weight: 700; white-space: nowrap; font-size: 14px; }
    .offers { font-size: 11px; color: var(--accent); }

    /* ── Status pill ── */
    .status-pill { display: inline-block; font-size: 11px; padding: 1px 5px; border-radius: 10px;
                   border: 1px solid var(--border); color: var(--text-muted); margin-top: 2px; }

    /* ── Progress bar for bulk ops ── */
    #progress-bar { display: none; background: var(--tag-bg); border-bottom: 1px solid var(--border); padding: 8px 20px; font-size: 13px; color: var(--accent); }
    #progress-bar.visible { display: block; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="." class="header-name">Discogs <span>Inventory</span></a>
  <div class="header-right" id="site-nav">Checking sign-in status…</div>
</header>

<div class="controls">
  <label>Username</label>
  <input type="text" id="username" placeholder="e.g. 360vinyl">

  <div class="sep"></div>

  <label>Status</label>
  <select id="status" onchange="onStatusChange()">
    <option value="For Sale" selected>For Sale</option>
    <option value="">All</option>
    <option value="Draft">Draft</option>
    <option value="Sold">Sold</option>
    <option value="Expired">Expired</option>
    <option value="Suspended">Suspended</option>
  </select>

  <div class="sep"></div>

  <label>Per page</label>
  <select id="per_page" onchange="onControlChange()">
    <option value="25">25</option>
    <option value="50" selected>50</option>
    <option value="100">100</option>
  </select>

  <button class="btn" onclick="loadAll()">Load</button>
  <button class="btn btn-sm" id="filters-toggle-btn" onclick="enableFilters()">🔍 Enable filters</button>
  <button class="btn btn-success ml-auto" onclick="openModal('create')">+ New Listing</button>
</div>

<div class="filters-bar" id="filters-row">
  <label>Artist</label>
  <select id="filter-artist" onchange="onFilterChange('artist', this.value)"><option value="">All Artist</option></select>
  <label>Format</label>
  <select id="filter-format" onchange="onFilterChange('format', this.value)"><option value="">All Format</option></select>
  <label>Condition</label>
  <select id="filter-condition" onchange="onFilterChange('condition', this.value)"><option value="">All Condition</option></select>
  <label>Location</label>
  <select id="filter-location" onchange="onFilterChange('location', this.value)"><option value="">All Location</option></select>
  <label>Audio</label>
  <select id="filter-audio" onchange="onFilterChange('audio', this.value)"><option value="">All Audio</option></select>
  <button class="btn btn-sm" style="margin-left:auto" onclick="clearFilters()">✕ Clear filters</button>
</div>

<div id="bulk-bar">
  <span id="bulk-count"></span>
  <button class="btn btn-danger btn-sm" onclick="bulkDelete()">Delete selected</button>
  <button class="btn btn-sm" onclick="bulkSetStatus('For Sale')">→ For Sale</button>
  <button class="btn btn-sm" onclick="bulkSetStatus('Draft')">→ Draft</button>
  <button class="btn btn-sm" style="margin-left:auto" onclick="clearSelection()">✕ Clear</button>
</div>

<div id="progress-bar"></div>

<div id="root">
  <div class="state">Enter a Discogs username and click Load.</div>
</div>

<!-- ── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Listing</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-release-info" class="release-info" style="display:none"></div>
      <form id="listing-form" onsubmit="return false">
        <input type="hidden" name="listing_id">
        <input type="hidden" name="mode">

        <div class="form-row" id="field-release-id">
          <label>Release ID <span style="color:var(--danger)">*</span></label>
          <input type="text" name="release_id" placeholder="e.g. 249504">
          <div class="form-hint">Find it in the Discogs release URL: discogs.com/release/<strong>249504</strong></div>
        </div>

        <div class="form-section">Grading</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Media Condition <span style="color:var(--danger)">*</span></label>
            <select name="condition">
              <option value="">— select —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
            </select>
          </div>
          <div class="form-row">
            <label>Sleeve Condition</label>
            <select name="sleeve_condition">
              <option value="">— not graded —</option>
              <option>Mint (M)</option>
              <option>Near Mint (NM or M-)</option>
              <option>Very Good Plus (VG+)</option>
              <option>Very Good (VG)</option>
              <option>Good Plus (G+)</option>
              <option>Good (G)</option>
              <option>Fair (F)</option>
              <option>Poor (P)</option>
              <option>Generic</option>
              <option>Not Graded</option>
              <option>No Cover</option>
            </select>
          </div>
        </div>

        <div class="form-section">Sale</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Price <span style="color:var(--danger)">*</span></label>
            <input type="text" name="price" placeholder="9.99">
          </div>
          <div class="form-row">
            <label>Status <span style="color:var(--danger)">*</span></label>
            <select name="status">
              <option value="For Sale">For Sale</option>
              <option value="Draft">Draft</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" name="allow_offers" id="allow_offers">
            <label for="allow_offers" style="display:inline;font-weight:400;margin:0">Allow offers</label>
          </div>
        </div>

        <div class="form-row">
          <label>Comments <span style="color:var(--text-muted);font-weight:400">(public — shown to buyers)</span></label>
          <textarea name="comments" placeholder="Condition notes, pressing info…"></textarea>
        </div>

        <div class="form-section">Seller-only fields</div>
        <div class="form-2col">
          <div class="form-row">
            <label>Location</label>
            <input type="text" name="location" placeholder="Shelf A-3">
          </div>
          <div class="form-row">
            <label>Private Notes</label>
            <input type="text" name="external_id" placeholder="Internal reference">
          </div>
        </div>
        <div class="form-2col">
          <div class="form-row">
            <label>Weight (g)</label>
            <input type="text" name="weight" placeholder="auto or e.g. 200">
          </div>
          <div class="form-row">
            <label>Counts As</label>
            <input type="text" name="format_quantity" placeholder="auto or 1">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="modal-save-btn" onclick="submitModal()">Save</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="nav.js?v=__NAV_JS_VERSION__"></script>
<script>
// ── Base URL (works on any subpath) ─────────────────────────────────────────
const BASE = window.location.pathname.replace(/\/inventory\/?$/, '');
initDiscogsNav('site-nav');

// ── Constants ───────────────────────────────────────────────────────────────
const COND_COLOR = {
  'M': '#1b5e20', 'NM or M-': '#2e7d32', 'VG+': '#558b2f',
  'VG': '#f57f17', 'G+': '#e65100', 'G': '#bf360c', 'F': '#b71c1c', 'P': '#6a1b9a',
};

// Extract short abbreviation from full condition string for badge display.
// "Very Good Plus (VG+)" → "VG+",  "VG+" → "VG+"
function condShort(s) {
  if (!s) return '';
  const m = String(s).match(/\(([^)]+)\)$/);
  return m ? m[1] : s;
}

// Ensure condition is the full form the API accepts for writes.
// "VG+" → "Very Good Plus (VG+)",  "Very Good Plus (VG+)" → as-is
const FULL_CONDITIONS = [
  'Mint (M)', 'Near Mint (NM or M-)', 'Very Good Plus (VG+)', 'Very Good (VG)',
  'Good Plus (G+)', 'Good (G)', 'Fair (F)', 'Poor (P)',
  'Generic', 'Not Graded', 'No Cover',
];
function condFull(s) {
  if (!s) return '';
  if (FULL_CONDITIONS.includes(s)) return s;
  // Short form → find full form by matching abbreviation inside parens
  return FULL_CONDITIONS.find(c => condShort(c) === s) ?? s;
}

function condBadge(c) {
  if (!c) return '';
  const short = condShort(c) || c;
  const bg = COND_COLOR[short] ?? '#757575';
  return `<span class="cond" style="background:${bg}" title="${esc(c)}">${esc(short)}</span>`;
}

// ── State ───────────────────────────────────────────────────────────────────
let _listings = [];        // current page
let _selected = new Set(); // selected listing IDs
let _pagination = {};
let _currentPage = 1;
let _sort = 'listed';
let _sortOrder = 'desc';

// Discogs' inventory endpoint only accepts these as the `sort` query param
// (its 'label' key exists too, but there's no label-name field in the
// response to attach a column to, so it's omitted here). Format/Year/
// Condition/Qty have no server-side sort, so those are sorted client-side
// (current page only) instead — same approach as collection.html.
const SERVER_SORT_KEYS = new Set(['artist', 'item', 'price', 'catno', 'audio', 'status', 'location', 'listed']);
const DEFAULT_DESC_KEYS = new Set(['listed', 'price']);
const COLUMNS = [
  { key: 'artist', label: 'Artist' },
  { key: 'item', label: 'Item' },
  { key: 'format', label: 'Format', clientOnly: true },
  { key: 'catno', label: 'Cat#' },
  { key: 'year', label: 'Year', clientOnly: true },
  { key: 'condition', label: 'Condition', clientOnly: true },
  { key: 'price', label: 'Price' },
  { key: 'status', label: 'Status' },
  { key: 'audio', label: 'Audio' },
  { key: 'location', label: 'Location' },
  { key: 'qty', label: 'Qty', clientOnly: true },
  { key: 'ships_from', label: 'Ships from', noSort: true },
  { key: 'listed', label: 'Listed' },
];

// [{key, order}, ...] in priority order; chain[0] mirrors _sort/_sortOrder.
let _sortChain = [{ key: 'listed', order: 'desc' }];

// Remembers the last sort the user picked (per browser, via localStorage) so
// it's the default next time — an explicit ?sort= in the URL still wins.
const SORT_STORAGE_KEY = 'discogs_inventory_sort';
function saveSortToStorage() {
  try { localStorage.setItem(SORT_STORAGE_KEY, JSON.stringify(_sortChain)); } catch { /* storage unavailable */ }
}
function loadSortFromStorage() {
  try {
    const chain = JSON.parse(localStorage.getItem(SORT_STORAGE_KEY));
    if (Array.isArray(chain) && chain.length && chain[0]?.key && chain[0]?.order) return chain;
  } catch { /* ignore malformed/missing value */ }
  return null;
}

function sortValueOf(item, key) {
  const rel = item.release ?? {};
  switch (key) {
    case 'artist': return (rel.artist ?? '').toLowerCase();
    case 'item': return (rel.title ?? rel.description ?? '').toLowerCase();
    case 'format': return (rel.format ?? '').toLowerCase();
    case 'catno': return (rel.catalog_number ?? '').toLowerCase();
    case 'year': return Number(rel.year) || 0;
    case 'condition': return condShort(item.condition) || '';
    case 'price': return Number(item.price?.value) || 0;
    case 'status': return item.status ?? '';
    case 'audio': return item.audio ? 1 : 0;
    case 'location': return (item.location ?? '').toLowerCase();
    case 'qty': return Number(item.quantity) || 0;
    case 'listed': return item.posted ?? '';
    default: return '';
  }
}

// Sorts an arbitrary array in place by the full chain (primary + tie-breakers).
function sortItems(arr) {
  const chain = _sortChain;
  arr.sort((a, b) => {
    for (const { key, order } of chain) {
      const dir = order === 'asc' ? 1 : -1;
      const av = sortValueOf(a, key), bv = sortValueOf(b, key);
      if (av < bv) return -dir;
      if (av > bv) return dir;
    }
    return 0;
  });
  return arr;
}
function applyClientSort() { sortItems(_listings); }

// Global filters: Discogs has no filter-by-format/condition/location/audio
// query param, so filtering means fetching the *entire* status-filtered
// inventory into memory first (unlike sort, which stays page-scoped) —
// opt-in via "Enable filters" since large inventories take many requests.
// null = not loaded.
let _allListings = null;
let _activeFilters = {};
const FILTER_COLUMNS = [
  { key: 'artist', label: 'Artist' },
  { key: 'format', label: 'Format' },
  { key: 'condition', label: 'Condition' },
  { key: 'location', label: 'Location' },
  { key: 'audio', label: 'Audio' },
];

function filterValueOf(item, key) {
  switch (key) {
    case 'artist': return item.release?.artist ? [item.release.artist] : [];
    case 'format': return item.release?.format ? [item.release.format] : [];
    case 'condition': return item.condition ? [item.condition] : [];
    case 'location': return item.location ? [item.location] : [];
    case 'audio': return [item.audio ? 'Yes' : 'No'];
    default: return [];
  }
}

function matchesActiveFilters(item) {
  return FILTER_COLUMNS.every(c => {
    const active = _activeFilters[c.key];
    return !active || filterValueOf(item, c.key).includes(active);
  });
}

function buildFilterOptions() {
  for (const c of FILTER_COLUMNS) {
    const values = new Set();
    for (const item of _allListings) filterValueOf(item, c.key).forEach(v => values.add(v));
    const sorted = [...values].sort((a, b) => a.localeCompare(b));
    const sel = document.getElementById(`filter-${c.key}`);
    if (sel) sel.innerHTML = `<option value="">All ${esc(c.label)}</option>` + sorted.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
  }
}

function resetFilters() {
  _allListings = null;
  _activeFilters = {};
  const row = document.getElementById('filters-row');
  if (row) row.classList.remove('visible');
  const btn = document.getElementById('filters-toggle-btn');
  if (btn) { btn.style.display = ''; btn.disabled = false; btn.textContent = '🔍 Enable filters'; }
}

async function enableFilters() {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }
  const status = document.getElementById('status').value;
  const btn = document.getElementById('filters-toggle-btn');
  btn.disabled = true;

  const items = [];
  try {
    let page = 1, pages = 1;
    do {
      btn.textContent = `Loading… ${items.length}`;
      const apiQs = new URLSearchParams({ sort: 'listed', sort_order: 'desc', per_page: '100', page });
      if (status) apiQs.set('status', status);
      const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/inventory?${apiQs}`);
      if (!resp.ok) throw new Error('request failed');
      const data = await resp.json();
      items.push(...(data.listings ?? []));
      pages = data.pagination?.pages ?? 1;
      page++;
    } while (page <= pages);
  } catch {
    toast("Couldn't load the full inventory for filtering", 'error');
    btn.disabled = false;
    btn.textContent = '🔍 Enable filters';
    return;
  }

  _allListings = items;
  buildFilterOptions();
  document.getElementById('filters-row').classList.add('visible');
  btn.style.display = 'none';
  renderFilteredPage(1);
}

function onFilterChange(key, value) {
  _activeFilters[key] = value;
  renderFilteredPage(1);
}

function clearFilters() {
  _activeFilters = {};
  FILTER_COLUMNS.forEach(c => { const el = document.getElementById(`filter-${c.key}`); if (el) el.value = ''; });
  renderFilteredPage(1);
}

function renderFilteredPage(page) {
  const filtered = sortItems(_allListings.filter(matchesActiveFilters));
  const perPage = Number(document.getElementById('per_page').value);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  page = Math.min(Math.max(1, page), totalPages);
  _currentPage = page;
  _listings = filtered.slice((page - 1) * perPage, page * perPage);
  _pagination = { page, pages: totalPages, per_page: perPage, items: filtered.length };
  clearSelection();
  renderTablePage();
}

// Called when username/status changes — the loaded full dataset (if any) no
// longer matches, so drop back to normal server-paginated mode.
function onStatusChange() {
  resetFilters();
  load(1);
}

// Called for controls that don't invalidate an already-loaded full dataset
// (currently just per_page) — re-paginate in whichever mode is active.
function onControlChange() {
  goToPage(1);
}

function goToPage(page) {
  if (_allListings) renderFilteredPage(page);
  else load(page);
}

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtPrice(p) { return p?.value ? `${esc(p.currency)} ${Number(p.value).toFixed(2)}` : '—'; }
function fmtDate(iso) { return iso ? iso.slice(0, 10) : ''; }
function parseNumAuto(v) {
  if (!v || v.trim() === '') return undefined;
  if (v.trim().toLowerCase() === 'auto') return 'auto';
  const n = parseFloat(v);
  return isNaN(n) ? undefined : n;
}

// ── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ── API ──────────────────────────────────────────────────────────────────────
async function apiDelete(id) {
  const r = await fetch(`${BASE}/marketplace/listings/${id}`, { method: 'DELETE' });
  if (!r.ok && r.status !== 204) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || r.statusText);
  }
}

async function apiEdit(id, body) {
  const r = await fetch(`${BASE}/marketplace/listings/${id}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok && r.status !== 204) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || r.statusText);
  }
}

async function apiCreate(body) {
  const r = await fetch(`${BASE}/marketplace/listings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.message || r.statusText);
  return data;
}

// ── Selection ────────────────────────────────────────────────────────────────
function toggleSelect(id, checked) {
  if (checked) _selected.add(id); else _selected.delete(id);
  const row = document.getElementById(`row-${id}`);
  if (row) row.classList.toggle('selected', checked);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  _listings.forEach(l => {
    _selected[checked ? 'add' : 'delete'](l.id);
    const row = document.getElementById(`row-${l.id}`);
    if (row) row.classList.toggle('selected', checked);
    const cb = document.getElementById(`check-${l.id}`);
    if (cb) cb.checked = checked;
  });
  updateBulkBar();
}

function clearSelection() {
  _selected.clear();
  document.querySelectorAll('input[id^=check-]').forEach(cb => cb.checked = false);
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  const checkAll = document.getElementById('check-all');
  if (checkAll) checkAll.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  const n = _selected.size;
  const bar = document.getElementById('bulk-bar');
  bar.classList.toggle('visible', n > 0);
  document.getElementById('bulk-count').textContent = `${n} listing${n !== 1 ? 's' : ''} selected`;
}

// ── Progress ─────────────────────────────────────────────────────────────────
function setProgress(msg) {
  const el = document.getElementById('progress-bar');
  if (msg) { el.textContent = msg; el.classList.add('visible'); }
  else el.classList.remove('visible');
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderThumb(url, title) {
  if (url) return `<img class="thumb" src="${esc(url)}" alt="${esc(title)}" loading="lazy"
    onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-ph',textContent:'♪'}))">`;
  return `<div class="thumb-ph">♪</div>`;
}

function visibleColumns() {
  return COLUMNS;
}

// Inventory listings only carry a flat artist *name* and a catalog_number —
// no artist_id/label_id (unlike the Collection API). To make Artist/Cat#
// clickable we lazily fetch the full release (GET /releases/{id}, which does
// have real artists[]/labels[] with ids) on click rather than for every row
// up front, to avoid an N+1 request burst when a page has up to 100 rows.
const _releaseCache = new Map();
function fetchReleaseCached(releaseId) {
  if (!_releaseCache.has(releaseId)) {
    _releaseCache.set(releaseId, fetch(`${BASE}/releases/${releaseId}`).then(r => r.ok ? r.json() : null).catch(() => null));
  }
  return _releaseCache.get(releaseId);
}

async function openArtistPage(event, el) {
  event.preventDefault();
  const releaseId = el.dataset.releaseId;
  const name = el.dataset.name;
  const tab = window.open('', '_blank');
  const rel = await fetchReleaseCached(releaseId);
  const artist = rel?.artists?.find(a => a.name === name) ?? rel?.artists?.[0];
  if (!tab) return;
  tab.location.href = artist
    ? `https://www.discogs.com/artist/${artist.id}`
    : `https://www.discogs.com/search/?q=${encodeURIComponent(name)}&type=artist`;
}

async function openLabelPage(event, el) {
  event.preventDefault();
  const releaseId = el.dataset.releaseId;
  const tab = window.open('', '_blank');
  const rel = await fetchReleaseCached(releaseId);
  const label = rel?.labels?.[0];
  if (!tab) return;
  tab.location.href = label ? `https://www.discogs.com/label/${label.id}` : `https://www.discogs.com/release/${releaseId}`;
}

function lazyLinkOrText(releaseId, text, handler, cls, extraAttr = '') {
  const t = esc(text);
  if (!releaseId || !text) return t;
  return `<a class="${cls}" href="#" data-release-id="${releaseId}" ${extraAttr} onclick="${handler}(event, this)">${t}</a>`;
}

function renderRow(item) {
  const rel = item.release ?? {};
  const artist = rel.artist ?? '';
  const title  = rel.title ?? rel.description ?? '';
  const listingUrl = item.uri ?? `https://www.discogs.com/sell/item/${item.id}`;
  const releaseUrl = rel.id ? `https://www.discogs.com/release/${rel.id}` : null;
  const isSelected = _selected.has(item.id);

  const condBlock = `<div class="cond-row">
    <div><span class="cond-label">media&nbsp;</span>${condBadge(item.condition)}</div>
    ${item.sleeve_condition ? `<div><span class="cond-label">sleeve</span> ${condBadge(item.sleeve_condition)}</div>` : ''}
  </div>`;

  const cellsByKey = {
    artist: lazyLinkOrText(rel.id, artist, 'openArtistPage', 'cell-link r-artist', `data-name="${esc(artist)}"`),
    item: `${releaseUrl ? `<a class="cell-link" href="${releaseUrl}" target="_blank">${esc(title)}</a>` : esc(title)}
      <div style="margin-top:3px">
        <a class="r-link" href="${listingUrl}" target="_blank">#${item.id}</a>
      </div>`,
    format: esc(rel.format ?? ''),
    catno: lazyLinkOrText(rel.id, rel.catalog_number, 'openLabelPage', 'cell-link'),
    year: esc(rel.year ?? ''),
    condition: condBlock,
    price: `<div class="price">${fmtPrice(item.price)}</div>${item.allow_offers ? '<div class="offers">offers OK</div>' : ''}`,
    status: item.status ? `<span class="status-pill">${esc(item.status)}</span>` : '',
    audio: item.audio ? '🎵' : '',
    location: esc(item.location ?? ''),
    qty: item.quantity != null ? esc(item.quantity) : '',
    ships_from: `<span style="white-space:nowrap;color:var(--text-muted)">${esc(item.ships_from ?? '')}</span>`,
    listed: `<span style="color:var(--text-muted);white-space:nowrap">${fmtDate(item.posted)}</span>`,
  };
  const cells = visibleColumns().map(c => `<td>${cellsByKey[c.key] ?? ''}</td>`).join('');

  return `<tr id="row-${item.id}" class="${isSelected ? 'selected' : ''}">
    <td class="col-check">
      <input type="checkbox" id="check-${item.id}" ${isSelected ? 'checked' : ''}
        onchange="toggleSelect(${item.id}, this.checked)">
    </td>
    <td class="col-thumb">${renderThumb(rel.thumbnail, title)}</td>
    ${cells}
    <td class="col-actions">
      <button class="btn btn-icon" title="Edit" onclick="openModal('edit', ${item.id})">✏</button>
      <button class="btn btn-icon btn-danger" title="Delete" onclick="deleteListing(${item.id})">🗑</button>
    </td>
  </tr>`;
}

function rerenderTbody() {
  const tbody = document.querySelector('#root table tbody');
  if (tbody) tbody.innerHTML = _listings.map(renderRow).join('');
}

function sortBadge(key) {
  const idx = _sortChain.findIndex(s => s.key === key);
  if (idx === -1) return '';
  const arrow = _sortChain[idx].order === 'asc' ? '▲' : '▼';
  const num = _sortChain.length > 1 ? `<sup>${idx + 1}</sup>` : '';
  return ` ${arrow}${num}`;
}

function renderTheadRow() {
  const cells = visibleColumns().map(c => {
    if (c.noSort) return `<th>${esc(c.label)}</th>`;
    const title = c.clientOnly
      ? 'Sorts only the items on the current page — not supported by the Discogs API for the whole inventory'
      : 'Click to sort, Shift+click to add as a secondary sort';
    return `<th class="sortable" onclick="onHeaderClick('${c.key}', event)" title="${title}">${esc(c.label)}${c.clientOnly ? ' <span class="col-note">(page)</span>' : ''}${sortBadge(c.key)}</th>`;
  }).join('');
  return `<tr>
    <th class="col-check"><input type="checkbox" id="check-all" onchange="toggleSelectAll(this.checked)"></th>
    <th class="col-thumb"></th>
    ${cells}
    <th></th>
  </tr>`;
}

function refreshThead() {
  const thead = document.querySelector('#root table thead');
  if (thead) thead.innerHTML = renderTheadRow();
}

// Plain click: replace the whole sort with just this column. Shift+click:
// append as a tie-breaker (or toggle its direction if already in the chain) —
// reorders the current page only, since the API has no multi-column sort.
function onHeaderClick(key, event) {
  if (event?.shiftKey) {
    const existing = _sortChain.find(s => s.key === key);
    if (existing) existing.order = existing.order === 'asc' ? 'desc' : 'asc';
    else _sortChain.push({ key, order: DEFAULT_DESC_KEYS.has(key) ? 'desc' : 'asc' });
    saveSortToStorage();
    applyClientSort();
    rerenderTbody();
    refreshThead();
    return;
  }

  if (_sort === key) {
    _sortOrder = _sortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    _sort = key;
    _sortOrder = DEFAULT_DESC_KEYS.has(key) ? 'desc' : 'asc';
  }
  _sortChain = [{ key: _sort, order: _sortOrder }];
  saveSortToStorage();

  if (SERVER_SORT_KEYS.has(key)) {
    load(1);
  } else {
    applyClientSort();
    rerenderTbody();
    refreshThead();
  }
}

function renderPagination(pag, page) {
  const total = pag.pages ?? 1;
  if (total <= 1) return '';
  const parts = [];
  parts.push(`<button onclick="goToPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`);
  let lo = Math.max(1, page-3), hi = Math.min(total, lo+6);
  if (hi-lo < 6) lo = Math.max(1, hi-6);
  if (lo > 1) { parts.push(`<button onclick="goToPage(1)">1</button>`); if (lo>2) parts.push(`<button disabled>…</button>`); }
  for (let p = lo; p <= hi; p++) parts.push(`<button class="${p===page?'active':''}" onclick="goToPage(${p})">${p}</button>`);
  if (hi < total) { if (hi<total-1) parts.push(`<button disabled>…</button>`); parts.push(`<button onclick="goToPage(${total})">${total}</button>`); }
  parts.push(`<button onclick="goToPage(${page+1})" ${page>=total?'disabled':''}>›</button>`);
  return `<div class="pagination">${parts.join('')}</div>`;
}

// ── Load ─────────────────────────────────────────────────────────────────────
function loadAll() {
  resetFilters();
  load(1);
}

async function load(page) {
  const username = document.getElementById('username').value.trim();
  if (!username) { alert('Enter a username.'); return; }

  const status  = document.getElementById('status').value;
  const perPage = document.getElementById('per_page').value;
  // Client-only sort keys (format/year/condition/qty) aren't valid API `sort`
  // values — fall back to 'listed' server-side and re-sort after loading.
  const apiSort = SERVER_SORT_KEYS.has(_sort) ? _sort : 'listed';

  const qs = new URLSearchParams({ user: username, status, sort: _sort, sort_order: _sortOrder, per_page: perPage, page });
  history.replaceState(null, '', '?' + qs);

  const apiQs = new URLSearchParams({ sort: apiSort, sort_order: _sortOrder, per_page: perPage, page });
  if (status) apiQs.set('status', status);

  document.getElementById('root').innerHTML = '<div class="state">Loading…</div>';
  _listings = [];
  clearSelection();

  try {
    const resp = await fetch(`${BASE}/users/${encodeURIComponent(username)}/inventory?${apiQs}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ message: resp.statusText }));
      document.getElementById('root').innerHTML = `<div class="state error">Error ${resp.status}: ${esc(err.message)}</div>`;
      return;
    }
    const data = await resp.json();
    _pagination  = data.pagination ?? {};
    _listings    = data.listings ?? [];
    applyClientSort();
    _currentPage = Number(_pagination.page ?? page);
    renderTablePage();
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="state error">Network error: ${esc(e.message)}</div>`;
  }
}

// Renders the infobar + table + pagination from the current _listings/
// _pagination/_currentPage — shared by the server-paginated path (load) and
// the client-side filtered path (renderFilteredPage).
function renderTablePage() {
  const total = Number(_pagination.items ?? _listings.length);
  const perP  = Number(_pagination.per_page ?? document.getElementById('per_page').value);
  const from  = _listings.length ? (_currentPage - 1) * perP + 1 : 0;
  const to    = Math.min(_currentPage * perP, total);
  const info  = total > 0 ? `Showing ${from}–${to} of ${total} listings` : 'No listings found';

  if (!_listings.length) {
    document.getElementById('root').innerHTML = `<div class="infobar">${info}</div><div class="state">No listings found.</div>`;
    return;
  }

  document.getElementById('root').innerHTML =
    `<div class="infobar">${info} · click a column header to sort, Shift+click to add a secondary sort</div>
     <div class="table-wrap"><table>
       <thead>${renderTheadRow()}</thead>
       <tbody>${_listings.map(renderRow).join('')}</tbody>
     </table></div>` +
    renderPagination(_pagination, _currentPage);
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteListing(id) {
  const item = _listings.find(l => l.id === id);
  const label = item ? `#${id}` : `#${id}`;
  if (!confirm(`Permanently delete listing ${label}?\nThis cannot be undone.`)) return;
  try {
    await apiDelete(id);
    _listings = _listings.filter(l => l.id !== id);
    _selected.delete(id);
    updateBulkBar();
    rerenderTbody();
    toast(`Listing #${id} deleted`, 'success');
    if (_listings.length === 0) load(Math.max(1, _currentPage - 1));
  } catch(e) {
    toast(`Delete failed: ${e.message}`, 'error');
  }
}

// ── Bulk delete ───────────────────────────────────────────────────────────────
async function bulkDelete() {
  const ids = [..._selected];
  if (!ids.length) return;
  if (!confirm(`Permanently delete ${ids.length} listing${ids.length > 1 ? 's' : ''}?\nThis cannot be undone.`)) return;

  let done = 0, failed = 0;
  for (const id of ids) {
    setProgress(`Deleting… ${done + failed + 1} / ${ids.length}`);
    try { await apiDelete(id); _listings = _listings.filter(l => l.id !== id); _selected.delete(id); done++; }
    catch { failed++; }
  }
  setProgress(null);
  updateBulkBar();
  rerenderTbody();
  if (done)   toast(`Deleted ${done} listing${done > 1 ? 's' : ''}`, 'success');
  if (failed) toast(`${failed} deletion${failed > 1 ? 's' : ''} failed`, 'error');
  if (_listings.length === 0) load(Math.max(1, _currentPage - 1));
}

// ── Bulk status change ────────────────────────────────────────────────────────
async function bulkSetStatus(status) {
  const ids = [..._selected];
  if (!ids.length) return;
  if (!confirm(`Set ${ids.length} listing${ids.length > 1 ? 's' : ''} to "${status}"?`)) return;

  let done = 0, failed = 0;
  for (const id of ids) {
    const item = _listings.find(l => l.id === id);
    if (!item?.release?.id) { failed++; continue; }
    setProgress(`Updating… ${done + failed + 1} / ${ids.length}`);
    try {
      await apiEdit(id, {
        release_id: item.release.id,
        condition:  condFull(item.condition),
        price:      item.price?.value ?? 0,
        status,
      });
      item.status = status;
      done++;
    } catch { failed++; }
  }
  setProgress(null);
  rerenderTbody();
  if (done)   toast(`Updated ${done} listing${done > 1 ? 's' : ''} → "${status}"`, 'success');
  if (failed) toast(`${failed} update${failed > 1 ? 's' : ''} failed`, 'error');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function fv(name) { return document.querySelector(`#listing-form [name="${name}"]`); }

function openModal(mode, listingId = null) {
  const form = document.getElementById('listing-form');
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save';

  form.querySelector('[name=mode]').value = mode;
  form.querySelector('[name=listing_id]').value = listingId ?? '';

  const releaseField = document.getElementById('field-release-id');
  const releaseInfo  = document.getElementById('modal-release-info');

  if (mode === 'create') {
    document.getElementById('modal-title').textContent = 'New Listing';
    releaseField.style.display = '';
    releaseInfo.style.display  = 'none';
    form.reset();
    fv('status').value = 'For Sale';

  } else {
    const item = _listings.find(l => l.id === listingId);
    const rel  = item?.release ?? {};
    document.getElementById('modal-title').textContent = `Edit Listing #${listingId}`;
    releaseField.style.display = 'none';
    releaseInfo.style.display  = '';
    releaseInfo.textContent = [rel.artist, rel.title, rel.format, rel.year].filter(Boolean).join(' — ');

    form.reset();
    fv('release_id').value      = rel.id ?? '';
    fv('condition').value       = condFull(item?.condition ?? '');
    fv('sleeve_condition').value = condFull(item?.sleeve_condition ?? '');
    fv('price').value           = item?.price?.value ?? '';
    fv('status').value          = item?.status ?? 'For Sale';
    fv('allow_offers').checked  = item?.allow_offers ?? false;
    fv('comments').value        = item?.comments ?? '';
    fv('location').value        = item?.location ?? '';
    fv('external_id').value     = item?.external_id ?? '';
    fv('weight').value          = item?.weight != null ? String(item.weight) : '';
    fv('format_quantity').value = item?.format_quantity != null ? String(item.format_quantity) : '';
  }

  document.getElementById('modal-overlay').classList.add('open');
  (mode === 'create' ? fv('release_id') : fv('price')).focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function submitModal() {
  const form    = document.getElementById('listing-form');
  const mode    = fv('mode').value;
  const id      = parseInt(fv('listing_id').value);
  const saveBtn = document.getElementById('modal-save-btn');

  const releaseId = parseInt(fv('release_id').value);
  const condition = fv('condition').value;
  const price     = parseFloat(fv('price').value);
  const status    = fv('status').value;

  if (!condition)      { toast('Select a media condition', 'error'); fv('condition').focus(); return; }
  if (isNaN(price))    { toast('Enter a valid price', 'error'); fv('price').focus(); return; }
  if (mode === 'create' && isNaN(releaseId)) { toast('Enter a release ID', 'error'); fv('release_id').focus(); return; }

  const body = {
    release_id:       mode === 'create' ? releaseId : (_listings.find(l => l.id === id)?.release?.id ?? releaseId),
    condition,
    sleeve_condition: fv('sleeve_condition').value || undefined,
    price,
    status,
    allow_offers:     fv('allow_offers').checked,
    comments:         fv('comments').value || undefined,
    location:         fv('location').value || undefined,
    external_id:      fv('external_id').value || undefined,
    weight:           parseNumAuto(fv('weight').value),
    format_quantity:  parseNumAuto(fv('format_quantity').value),
  };
  Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  try {
    if (mode === 'edit') {
      await apiEdit(id, body);
      // Patch in-memory so we don't need a reload
      const item = _listings.find(l => l.id === id);
      if (item) Object.assign(item, {
        condition:       body.condition,
        sleeve_condition: body.sleeve_condition ?? '',
        status:          body.status,
        allow_offers:    body.allow_offers,
        comments:        body.comments ?? '',
        location:        body.location ?? '',
        external_id:     body.external_id ?? '',
        weight:          body.weight,
        format_quantity: body.format_quantity,
        price:           { ...(item.price ?? {}), value: body.price },
      });
      rerenderTbody();
      toast('Listing saved', 'success');
    } else {
      const res = await apiCreate(body);
      toast(`Created listing #${res.listing_id}`, 'success');
      load(_currentPage);
    }
    closeModal();
  } catch(e) {
    toast(`Error: ${e.message}`, 'error');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }
}

// ── Close modal on overlay click ──────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Restore URL state or auto-load the authenticated user ─────────────────────
(async function () {
  const p = new URLSearchParams(location.search);
  if (p.get('sort')) {
    _sort      = p.get('sort');
    _sortOrder = p.get('sort_order') ?? 'desc';
    _sortChain = [{ key: _sort, order: _sortOrder }];
  } else {
    const stored = loadSortFromStorage();
    if (stored) { _sortChain = stored; _sort = stored[0].key; _sortOrder = stored[0].order; }
  }

  if (p.get('user')) {
    document.getElementById('username').value = p.get('user');
    document.getElementById('status').value   = p.get('status') ?? 'For Sale';
    document.getElementById('per_page').value = p.get('per_page') ?? '50';
    load(parseInt(p.get('page') ?? '1', 10));
    return;
  }
  // No URL params — check if OAuth is active and auto-load that user's inventory.
  try {
    const data = await fetch(`${BASE}/oauth/status`).then(r => r.json());
    if (data.authorized && data.username) {
      document.getElementById('username').value = data.username;
      load(1);
    }
  } catch { /* ignore, user can enter username manually */ }
})();

document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') load(1); });
</script>
