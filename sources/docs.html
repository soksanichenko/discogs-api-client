<!DOCTYPE html>
<html>
<head>
  <title>Discogs API — local proxy</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="theme.css?v=__THEME_CSS_VERSION__">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    #swagger-ui { background: #fff; }
  </style>
</head>
<body>
<header class="site-header">
  <a href="." class="header-name">Discogs <span>API Proxy</span></a>
  <div class="header-right" id="site-nav">Checking sign-in status…</div>
</header>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="nav.js?v=__NAV_JS_VERSION__"></script>
<script>
  SwaggerUIBundle({
    url: 'openapi.json',
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
    persistAuthorization: true,
    tryItOutEnabled: true,
  });

  initDiscogsNav('site-nav');
</script>
</body>
</html>
