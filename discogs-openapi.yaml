openapi: 3.1.0
info:
  title: Discogs API
  version: "2.0"
  description: >
    Unofficial OpenAPI spec for the Discogs API v2.0.
    Source: https://www.discogs.com/developers/
    Covers the full public Discogs API v2.0: Authentication, Database,
    Marketplace, Inventory Export, Inventory Upload, User Identity, User
    Collection, User Wantlist, and User Lists.
  termsOfService: https://support.discogs.com/hc/articles/360009334593-API-Terms-of-Use
  contact:
    url: https://www.discogs.com/developers/

servers:
- url: https://api.discogs.com
  description: Production API

# ---------------------------------------------------------------------------
# SECURITY
# ---------------------------------------------------------------------------
# Discogs supports several authentication modes:
#  1. No authentication       - low rate-limit tier, no image URLs
#  2. Consumer key/secret     - high rate-limit tier, image URLs,
#                               but does NOT identify the requester as a user
#  3. Personal access token   - high rate-limit tier, image URLs,
#                               identifies the requester (token holder only)
#  4. Full OAuth 1.0a         - same as token, but on behalf of any user
#
# OpenAPI 3.x has no first-class support for OAuth 1.0a (only OAuth2/OIDC),
# so the request_token / access_token flow is modeled below as plain paths,
# and the resulting access token/secret is represented as an apiKey header.
# This is a simplification but works for client codegen.
  x-internal: false
security: &id015
- discogsToken: []
- discogsKey: []
  discogsSecret: []

# ---------------------------------------------------------------------------
# REUSABLE COMPONENTS
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    discogsKey:
      type: apiKey
      in: query
      name: key
      description: >
        Consumer Key of your Discogs application. Use together with discogsSecret.
        Register your app at: discogs.com → Settings → Developers → Register an Application.
        Does not identify a user — only increases the rate limit and unlocks image URLs.

    discogsSecret:
      type: apiKey
      in: query
      name: secret
      description: >
        Consumer Secret of your Discogs application. Use together with discogsKey.

    discogsToken:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Personal Access Token — identifies you as a specific Discogs user.
        Get yours at: discogs.com → Settings → Developers → Generate Token.
        Value format: 'Discogs token=YOUR_TOKEN'


  # -------------------------------------------------------------------------
  # Shared query parameters (reused across all paginated/list endpoints)
  # -------------------------------------------------------------------------
  parameters:
    pageParam:
      name: page
      in: query
      required: false
      description: The page you want to request
      schema:
        type: integer
        minimum: 1
        default: 1

        format: int32
        maximum: 9999
    perPageParam:
      name: per_page
      in: query
      required: false
      description: The number of items per page (up to 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

        format: int32
    currAbbrParam:
      name: curr_abbr
      in: query
      required: false
      description: >
        Currency for marketplace data. Defaults to the authenticated user's
        currency.
      schema:
        type: string
        enum: [USD, GBP, EUR, CAD, AUD, JPY, CHF, MXN, BRL, NZD, SEK, ZAR]

  # -------------------------------------------------------------------------
  # Shared response headers (rate limiting + pagination Link header)
  # -------------------------------------------------------------------------
  headers:
    RateLimit:
      description: The total number of requests you can make in a one minute window
      schema:
        type: integer

        format: int32
        minimum: 0
        maximum: 2147483647
    RateLimitUsed:
      description: The number of requests you've made in your existing rate limit window
      schema:
        type: integer

        format: int32
        minimum: 0
        maximum: 2147483647
    RateLimitRemaining:
      description: The number of remaining requests you are able to make in the existing rate limit window
      schema:
        type: integer

        format: int32
        minimum: 0
        maximum: 2147483647
    Link:
      description: >
        RFC5988 Link header with rel=next/prev/first/last for pagination
        (duplicates the pagination object in the response body)
      schema:
        type: string

  # -------------------------------------------------------------------------
  # Shared schemas
  # -------------------------------------------------------------------------
        maxLength: 500
        pattern: ^[\s\S]*$
    RateLimit-Limit:
      description: Total requests allowed per rate-limit window
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 100
    RateLimit-Remaining:
      description: Requests remaining in the current rate-limit window
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 100
    Access-Control-Allow-Origin:
      description: CORS Access-Control-Allow-Origin header
      schema:
        type: string
        enum:
        - '*'
    X-RateLimit-Limit:
      description: Total requests allowed per rate-limit window (X-RateLimit style)
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 100
    RateLimit-Reset:
      description: Unix timestamp when the rate-limit window resets
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 9999999999
    Retry-After:
      description: Seconds to wait before retrying after a 429 Too Many Requests response
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 86400
  schemas:

    Error:
      type: object
      properties:
        message:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
      required: [message]

    PaginationUrls:
      type: object
      properties:
        first:
          type: string
          format: uri
          maxLength: 2083
        prev:
          type: string
          format: uri
          maxLength: 2083
        next:
          type: string
          format: uri
          maxLength: 2083
        last:
          type: string
          format: uri

          maxLength: 2083
    Pagination:
      type: object
      description: Embedded in the body of any paginated response
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
        pages:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
        items:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        per_page:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        urls:
          $ref: '#/components/schemas/PaginationUrls'
      required: [page, pages, items, per_page]

    Image:
      type: object
      properties:
        type:
          type: string
          enum: [primary, secondary]
        uri:
          type: string
          format: uri
          maxLength: 2083
        uri150:
          type: string
          format: uri
          maxLength: 2083
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        width:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
        height:
          type: integer

          format: int32
          minimum: 0
          maximum: 2147483647
    Video:
      type: object
      description: Embedded in Release and Master objects
      properties:
        uri:
          type: string
          format: uri
          maxLength: 2083
        title:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        description:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        duration:
          type: integer
          description: Duration in seconds
          format: int32
          minimum: 0
          maximum: 2147483647
        embed:
          type: boolean

    Identifier:
      type: object
      properties:
        type:
          type: string
          example: Barcode
          maxLength: 500
          pattern: ^[\s\S]*$
        value:
          type: string

          maxLength: 500
          pattern: ^[\s\S]*$
    Format:
      type: object
      properties:
        name:
          type: string
          example: Vinyl
          maxLength: 500
          pattern: ^[\s\S]*$
        qty:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        descriptions:
          type: array
          items:
            type: string

            maxLength: 500
            pattern: ^[\s\S]*$
          maxItems: 500
    Track:
      type: object
      properties:
        position:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        type_:
          type: string
          example: track
          maxLength: 500
          pattern: ^[\s\S]*$
        title:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        duration:
          type: string
          example: "3:32"
          maxLength: 500
          pattern: ^[\s\S]*$
        extraartists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistRef'

          maxItems: 500
    UserRef:
      type: object
      description: Minimal user reference (e.g. contributor, submitter)
      properties:
        username:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri

          maxLength: 2083
    Company:
      type: object
      description: Companies field on a Release (manufacturers, distributors, etc.)
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        name:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        catno:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        entity_type:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        entity_type_name:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri

    # Nested reference used inside Release/Master/Listing — the full Artist
    # resource is described separately below.
          maxLength: 2083
    ArtistRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        name:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        anv:
          type: string
          description: Artist Name Variation
          maxLength: 500
          pattern: ^[\s\S]*$
        join:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        role:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        tracks:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri

    # Nested reference used inside Release — the full Label resource
    # is described separately below.
          maxLength: 2083
    LabelRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        name:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        catno:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        entity_type:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        entity_type_name:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri

          maxLength: 2083
    Price:
      type: object
      properties:
        currency:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        value:
          type: number

    # --- Marketplace: shared building blocks --------------------------------

    Condition:
      type: string
      description: Media condition grading scale used across Marketplace endpoints
      enum:
      - Mint (M)
      - Near Mint (NM or M-)
      - Very Good Plus (VG+)
      - Very Good (VG)
      - Good Plus (G+)
      - Good (G)
      - Fair (F)
      - Poor (P)

    SleeveCondition:
      type: string
      description: Sleeve condition grading scale (superset of Condition)
      enum:
      - Mint (M)
      - Near Mint (NM or M-)
      - Very Good Plus (VG+)
      - Very Good (VG)
      - Good Plus (G+)
      - Good (G)
      - Fair (F)
      - Poor (P)
      - Generic
      - Not Graded
      - No Cover

    OrderStatus:
      type: string
      enum:
      - New Order
      - Buyer Contacted
      - Invoice Sent
      - Payment Pending
      - Payment Received
      - In Progress
      - Shipped
      - Merged
      - Order Changed
      - Refund Sent
      - Cancelled
      - Cancelled (Non-Paying Buyer)
      - Cancelled (Item Unavailable)
      - Cancelled (Per Buyer's Request)
      - Cancelled (Refund Received)

    ListingStatus:
      type: string
      enum: [For Sale, Draft, Expired, Sold, Suspended, Violation, Deleted]

    OriginalPrice:
      type: object
      description: Price expressed in the listing's native currency, alongside the requested curr_abbr conversion
      properties:
        curr_abbr:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        curr_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        formatted:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        value:
          type: number

    ShippingPrice:
      type: object
      properties:
        currency:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        method:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        value:
          type: number

    SellerStats:
      type: object
      properties:
        rating:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        stars:
          type: number
        total:
          type: integer

          format: int32
          minimum: 0
          maximum: 2147483647
    SellerRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        username:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        url:
          type: string
          format: uri
          maxLength: 2083
        avatar_url:
          type: string
          format: uri
          maxLength: 2083
        shipping:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        payment:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        stats:
          $ref: '#/components/schemas/SellerStats'

    ListingReleaseRef:
      type: object
      description: Minimal release info embedded in a Listing/Inventory item (not the full Release resource)
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        description:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        artist:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        title:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        format:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        year:
          type: integer
          format: int32
          minimum: 1000
          maximum: 9999
        catalog_number:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        thumbnail:
          type: string
          format: uri

          maxLength: 2083
    InventoryListingItem:
      type: object
      description: >
        Listing item as returned in a seller's Inventory listing. Owner-only
        fields (weight, format_quantity, external_id, location, quantity,
        in_cart) are present only when authenticated as the inventory owner.
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        status:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        price:
          $ref: '#/components/schemas/Price'
        allow_offers:
          type: boolean
        sleeve_condition:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        condition:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        posted:
          type: string
          format: date-time
          maxLength: 50
        ships_from:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        uri:
          type: string
          format: uri
          maxLength: 2083
        comments:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        audio:
          type: boolean
        seller:
          $ref: '#/components/schemas/SellerRef'
        release:
          $ref: '#/components/schemas/ListingReleaseRef'
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        weight:
          type: number
          description: Owner-only field
        format_quantity:
          type: integer
          description: Owner-only field
          format: int32
          minimum: 0
          maximum: 2147483647
        external_id:
          type: string
          description: Owner-only field ("Private Comments" on the website)
          maxLength: 500
          pattern: ^[\s\S]*$
        location:
          type: string
          description: Owner-only field
          maxLength: 500
          pattern: ^[\s\S]*$
        quantity:
          type: integer
          description: Owner-only field; read-only and fixed at 1 for NearMint users
          format: int32
          minimum: 0
          maximum: 2147483647
        in_cart:
          type: boolean
          description: Present only when the requester is authenticated

    Listing:
      type: object
      description: Full Marketplace listing resource (GET /marketplace/listings/{listing_id})
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        status:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        price:
          $ref: '#/components/schemas/Price'
        original_price:
          $ref: '#/components/schemas/OriginalPrice'
        allow_offers:
          type: boolean
        sleeve_condition:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        condition:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        posted:
          type: string
          format: date-time
          maxLength: 50
        ships_from:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        uri:
          type: string
          format: uri
          maxLength: 2083
        comments:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        seller:
          $ref: '#/components/schemas/SellerRef'
        shipping_price:
          $ref: '#/components/schemas/Price'
        original_shipping_price:
          $ref: '#/components/schemas/OriginalPrice'
        release:
          $ref: '#/components/schemas/ListingReleaseRef'
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        audio:
          type: boolean
        weight:
          type: number
          description: Owner-only field
        format_quantity:
          type: integer
          description: Owner-only field
          format: int32
          minimum: 0
          maximum: 2147483647
        external_id:
          type: string
          description: Owner-only field ("Private Comments" on the website)
          maxLength: 500
          pattern: ^[\s\S]*$
        location:
          type: string
          description: Owner-only field
          maxLength: 500
          pattern: ^[\s\S]*$
        quantity:
          type: integer
          description: Owner-only field
          format: int32
          minimum: 0
          maximum: 2147483647
        in_cart:
          type: boolean
          description: Present only when the requester is authenticated

    NewListingRequest:
      type: object
      properties:
        release_id:
          type: integer
          description: The ID of the release you are posting
          format: int64
          minimum: 1
          maximum: 2147483647
        condition:
          $ref: '#/components/schemas/Condition'
        sleeve_condition:
          $ref: '#/components/schemas/SleeveCondition'
        price:
          type: number
          description: The price of the item (in the seller's currency)
        comments:
          type: string
          description: Any remarks about the item that will be displayed to buyers
          maxLength: 5000
          pattern: ^[\s\S]*$
        allow_offers:
          type: boolean
          default: false
        status:
          type: string
          enum: [For Sale, Draft]
          description: Defaults to "For Sale"
        external_id:
          type: string
          description: Freeform seller-only reference ("Private Comments" on the website)
          maxLength: 500
          pattern: ^[\s\S]*$
        location:
          type: string
          description: Freeform field to help identify physical storage location
          maxLength: 500
          pattern: ^[\s\S]*$
        weight:
          description: Weight in grams, or "auto" to estimate automatically
          oneOf:
          - type: number
          - type: string
            enum: [auto]
        format_quantity:
          description: Number of items this listing counts as for shipping ("Counts As"), or "auto"
          oneOf:
          - type: number
          - type: string
            enum: [auto]
      required: [release_id, condition, price, status]
      example:
        release_id: 249504
        condition: Very Good Plus (VG+)
        sleeve_condition: Very Good Plus (VG+)
        price: 9.99
        comments: Light surface marks, plays perfectly
        allow_offers: false
        status: For Sale
        weight: 200
        format_quantity: 1

    NewListingResponse:
      type: object
      properties:
        listing_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        resource_url:
          type: string
          format: uri

          maxLength: 2083
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        release:
          type: object
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
              maximum: 2147483647
            description:
              type: string
              maxLength: 5000
              pattern: ^[\s\S]*$
        price:
          $ref: '#/components/schemas/Price'
        media_condition:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        sleeve_condition:
          type: string

          maxLength: 500
          pattern: ^[\s\S]*$
    OrderTracking:
      type: object
      properties:
        number:
          type: string
          description: The tracking number provided by the carrier
          maxLength: 500
          pattern: ^[\s\S]*$
        carrier:
          type: string
          enum: [UPS, USPS, DHL, Deutsche Post, La Poste, Royal Mail, PostNL, DHL Germany, Other]
          description: Defaults to no carrier specified if omitted
      required: [number]

    Order:
      type: object
      properties:
        id:
          type: string
          description: Composite order ID, e.g. "1-1"
          maxLength: 500
          pattern: ^[\s\S]*$
        resource_url:
          type: string
          format: uri
          maxLength: 2083
        messages_url:
          type: string
          format: uri
          maxLength: 2083
        uri:
          type: string
          format: uri
          maxLength: 2083
        status:
          $ref: '#/components/schemas/OrderStatus'
        next_status:
          type: array
          description: Valid statuses the order can transition to next
          items:
            $ref: '#/components/schemas/OrderStatus'
          maxItems: 500
        fee:
          $ref: '#/components/schemas/Price'
        created:
          type: string
          format: date-time
          maxLength: 50
        last_activity:
          type: string
          format: date-time
          maxLength: 50
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          maxItems: 500
        shipping:
          $ref: '#/components/schemas/ShippingPrice'
        shipping_address:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        additional_instructions:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        archived:
          type: boolean
        seller:
          $ref: '#/components/schemas/SellerRef'
        buyer:
          $ref: '#/components/schemas/SellerRef'

    EditOrderRequest:
      type: object
      description: >
        All fields optional; status must be present in the order's next_status
        list. status and shipping are mutually exclusive in a single request:
        changing shipping always sets the order status to "Invoice Sent" as a
        side effect, so the API does not allow setting both at once.
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        shipping:
          type: number
          description: >
            The order shipping amount. As a side-effect of setting this value,
            the buyer is invoiced and the order status is set to "Invoice Sent"
        tracking:
          $ref: '#/components/schemas/OrderTracking'
          description: Only the seller can set tracking; buyers get 403 Forbidden

      example:
        status: Payment Received
        tracking:
          number: 1Z999AA10123456784
          carrier: UPS
    OrderMessage:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 2147483647
        message:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        timestamp:
          type: string
          format: date-time
          maxLength: 50
        subject:
          type: string
          maxLength: 5000
          pattern: ^[\s\S]*$
        from:
