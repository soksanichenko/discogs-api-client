  # --- Inventory Export -----------------------------------------------------
  # Bulk async export of a seller's full inventory as CSV, intended for sellers
  # with large inventories who would otherwise hit pagination/rate limits on
  # GET /users/{username}/inventory. Typical flow:
  #   1. POST /inventory/export            -> creates a new export job
  #   2. GET  /inventory/export            -> list recent jobs, find the id
  #   3. GET  /inventory/export/{id}       -> poll until status = "success"
  #   4. GET  /inventory/export/{id}/download -> fetch the CSV file

        '422':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '429':
          $ref: '#/components/responses/Error429'
  /inventory/export:
    post:
      summary: Export your inventory
      description: >
        Request an export of your inventory as a CSV. Authentication as the
        inventory owner is required.
      tags: [Inventory Export]
      responses:
        '200':
          description: Export job created
          headers:
            Location:
              description: URL of the newly created export job
              schema:
                type: string
                format: uri
                maxLength: 2083
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
            X-Discogs-Ratelimit-Remaining: *id013
            X-RateLimit-Limit: *id002
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers:
            X-RateLimit-Limit: *id002
            RateLimit-Limit: *id003
            RateLimit-Remaining: *id004
            Access-Control-Allow-Origin: *id014
            X-Discogs-Ratelimit: *id005
            X-Discogs-Ratelimit-Used: *id006
            X-Discogs-Ratelimit-Remaining: *id007
        '409':
          description: Conflict — an export is already in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
            X-RateLimit-Limit: *id002
            RateLimit-Limit: *id003
            RateLimit-Remaining: *id004
            X-Discogs-Ratelimit: *id005
            X-Discogs-Ratelimit-Used: *id006
            X-Discogs-Ratelimit-Remaining: *id007
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '422':
          $ref: '#/components/responses/Error400'
      security: *id015
    get:
      summary: Get recent exports
      description: >
        Get a list of all recent exports of your inventory.
        Accepts pagination parameters.
      tags: [Inventory Export]
      parameters:
      - $ref: '#/components/parameters/pageParam'
      - $ref: '#/components/parameters/perPageParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryExportJob'
                    maxItems: 500
          headers:
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
