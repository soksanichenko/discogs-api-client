        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '422':
          $ref: '#/components/responses/Error400'
      security: *id015
    put:
      summary: Update Release Rating By User
      description: >
        Updates the release's rating for a given user.
        Authentication as the user is required.
      tags: [Database]
      parameters:
      - name: release_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9]+$
          maxLength: 20
        example: 249504
      - name: username
