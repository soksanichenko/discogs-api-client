  /releases/{release_id}/rating/{username}:
    get:
      summary: Get Release Rating By User
      description: Retrieves the release's rating for a given user.
      tags: [Database]
      parameters:
      - name: release_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9]+$
          maxLength: 20
        example: 249504
      - name: username
        in: path
        required: true
        description: The username of the rating you are trying to request
        schema:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        example: vargind
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseRating'
          headers:
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
            X-Discogs-Ratelimit-Remaining: *id013
            X-RateLimit-Limit: *id002
