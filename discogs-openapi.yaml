paths:

  # --- Authentication --------------------------------------------------

  /oauth/request_token:
    get:
      summary: Generate the request token
      tags: [Authentication]
      security: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: >
          OAuth oauth_consumer_key="...", oauth_nonce="...",
          oauth_signature="your_consumer_secret&",
          oauth_signature_method="PLAINTEXT", oauth_timestamp="...",
          oauth_callback="..."
        schema:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
      responses:
        '200':
          description: Returns oauth_token, oauth_token_secret, oauth_callback_confirmed headers
          headers:
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
            X-Discogs-Ratelimit-Remaining: *id013
            X-RateLimit-Limit: *id002
        '400':
          description: Invalid OAuth request

          headers:
            X-RateLimit-Limit: *id002
            RateLimit-Limit: *id003
            RateLimit-Remaining: *id004
            Access-Control-Allow-Origin: &id014
              $ref: '#/components/headers/Access-Control-Allow-Origin'
            X-Discogs-Ratelimit: *id005
            X-Discogs-Ratelimit-Used: *id006
            X-Discogs-Ratelimit-Remaining: *id007
        '401':
          $ref: '#/components/responses/Error401'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
  /oauth/access_token:
    post:
      summary: Generate the access token
      tags: [Authentication]
      security: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: >
          OAuth oauth_consumer_key="...", oauth_token="...",
          oauth_signature="your_consumer_secret&",
          oauth_signature_method="PLAINTEXT", oauth_timestamp="...",
          oauth_verifier="..."
        schema:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
      responses:
        '200':
          description: Returns oauth_token and oauth_token_secret headers
          headers:
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
            X-Discogs-Ratelimit-Remaining: *id013
            X-RateLimit-Limit: *id002
        '400':
          description: Expired verifier or malformed request

