      summary: Get Collection Folders
      description: >
        Retrieve a list of folders in a user's collection. If the collection
        is private, authentication as the owner is required. Unauthenticated
        callers only see folder 0 (the "All" folder), if the collection is
        public.
      tags: [User Collection]
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        example: vargind
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      $ref: '#/components/schemas/CollectionFolder'
                    maxItems: 500
          headers:
            RateLimit-Limit: *id008
            RateLimit-Remaining: *id009
            Access-Control-Allow-Origin: *id010
            X-Discogs-Ratelimit: *id011
            X-Discogs-Ratelimit-Used: *id012
            X-Discogs-Ratelimit-Remaining: *id013
            X-RateLimit-Limit: *id002
        '401':
          $ref: '#/components/responses/Error401'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '422':
          $ref: '#/components/responses/Error400'
      security: *id015
    post:
      summary: Create Folder
      description: >
        Create a new folder in a user's collection.
        Authentication as the collection owner is required.
      tags: [User Collection]
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          maxLength: 500
          pattern: ^[\s\S]*$
        example: vargind
      requestBody:
        required: false
        content:
          application/json:
            schema:
