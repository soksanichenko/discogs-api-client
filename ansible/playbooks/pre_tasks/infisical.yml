---
- name: Login to Infisical
  tags: always
  infisical.vault.login:
    url: "{{ lookup('env', 'INFISICAL_API_URL') }}"
    auth_method: universal_auth
    universal_auth_client_id: "{{ lookup('env', 'INFISICAL_CLIENT_ID') }}"
    universal_auth_client_secret: "{{ lookup('env', 'INFISICAL_CLIENT_SECRET') }}"
  register: infisical_login
  delegate_to: localhost
  become: no
  no_log: true

- name: Load secrets from Infisical
  tags: always
  infisical.vault.read_secrets:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ infisical_project_id }}"
    env_slug: "{{ infisical_env_slug | default('prod') }}"
    path: "{{ infisical_path }}"
    include_imports: true
    as_dict: true
  register: _infisical_raw
  delegate_to: localhost
  become: no
  no_log: true

- name: Set infisical_secrets fact
  tags: always
  ansible.builtin.set_fact:
    infisical_secrets: "{{ _infisical_raw }}"
  no_log: true

- name: Fetch Cloudflare zone ID
  tags: always
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ cf_zone_domain }}"
    headers:
      Authorization: "Bearer {{ infisical_secrets.secrets['cf-api-token-dns-management'] }}"
    method: GET
  register: _cf_zones
  become: no
  no_log: true
  when: cf_zone_domain is defined

- name: Set cf_zone_id fact
  tags: always
  ansible.builtin.set_fact:
    cf_zone_id: "{{ _cf_zones.json.result[0].id }}"
  when: cf_zone_domain is defined
...
