---
- name: Restart discogs-api-client
  community.docker.docker_container:
    name: "{{ discogs_api_client_container_name }}"
    state: started
    restart: yes
  become: yes

- name: Reload nginx
  community.docker.docker_container_exec:
    container: "{{ nginx_docker_container_name }}"
    command: nginx -s reload
  become: yes
...
